name: Release

on:
  push:
    tags:
      # Canonical scheme is UNPREFIXED 0.x tags (0.1.7, 0.1.8, ...); the
      # legacy v-prefix pattern stays as a safety net for stray tags.
      - '[0-9]*.[0-9]*.[0-9]*'
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Generate changelog
        id: changelog
        run: |
          # Baseline = nearest ancestor tag of the released commit (not the
          # second-highest version-sorted tag repo-wide, which breaks across
          # mixed prefixes and off-lineage tags).
          PREV_TAG=$(git describe --tags --abbrev=0 "${GITHUB_REF_NAME}^" 2>/dev/null || true)
          if [ -z "$PREV_TAG" ]; then
            CHANGELOG=$(git log --pretty=format:"- %s (%h)" HEAD)
          else
            CHANGELOG=$(git log --pretty=format:"- %s (%h)" "${PREV_TAG}..HEAD")
          fi
          # Write to file for multiline output
          echo "$CHANGELOG" > /tmp/changelog.md
          echo "changelog_file=/tmp/changelog.md" >> "$GITHUB_OUTPUT"

      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: false
          body_path: /tmp/changelog.md
          draft: false
          prerelease: false
