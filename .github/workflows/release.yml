name: Release

on:
  push:
    tags:
      # Canonical scheme is UNPREFIXED 0.x tags (0.1.7, 0.1.8, ...); the
      # legacy v-prefix pattern stays as a safety net for stray tags.
      - '[0-9]*.[0-9]*.[0-9]*'
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      - name: Generate changelog
        id: changelog
        run: |
          # Baseline = nearest ancestor tag of the released commit (not the
          # second-highest version-sorted tag repo-wide, which breaks across
          # mixed prefixes and off-lineage tags).
          PREV_TAG=$(git describe --tags --abbrev=0 "${GITHUB_REF_NAME}^" 2>/dev/null || true)
          if [ -z "$PREV_TAG" ]; then
            CHANGELOG=$(git log --pretty=format:"- %s (%h)" HEAD)
          else
            CHANGELOG=$(git log --pretty=format:"- %s (%h)" "${PREV_TAG}..HEAD")
          fi
          # Write to file for multiline output
          echo "$CHANGELOG" > /tmp/changelog.md
          echo "changelog_file=/tmp/changelog.md" >> "$GITHUB_OUTPUT"

      - name: Build offline self-replication artifacts
        id: artifacts
        run: |
          # Val Ark is offline-first and self-replicating: a Release must ship the
          # SAME payload scripts/mirror-self.sh serves at /sources/val-ark/ and that
          # bootstrap.sh consumes — a full-history git bundle (`git clone <bundle>`)
          # and a source tarball (`tar --strip-components=1`, so it carries a
          # val-ark/ prefix). We build them inline with plain git (mirror-self.sh
          # resolves a data-disk root and emits stable/unversioned names into that
          # tree, neither of which fits a bare runner or a versioned release), then
          # attach them below. Version comes from the tag, never hardcoded.
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"          # 0.1.11 or v0.1.11 -> 0.1.11
          OUT="${RUNNER_TEMP}/val-ark-artifacts"
          mkdir -p "$OUT"
          BUNDLE="val-ark-${VERSION}.bundle"
          TARBALL="val-ark-${VERSION}.tar.gz"
          # Full-history bundle — clonable offline, exactly like bootstrap.sh does.
          git bundle create "${OUT}/${BUNDLE}" --all
          git bundle verify "${OUT}/${BUNDLE}"
          # Source tarball with the val-ark/ prefix bootstrap.sh strips on extract.
          git archive --format=tar.gz --prefix="val-ark/" -o "${OUT}/${TARBALL}" HEAD
          # Checksums over the artifact basenames (verify with `sha256sum -c`).
          ( cd "$OUT" && sha256sum "$BUNDLE" "$TARBALL" > SHA256SUMS )
          echo "dir=${OUT}" >> "$GITHUB_OUTPUT"

      - name: Create release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3
        with:
          generate_release_notes: false
          body_path: /tmp/changelog.md
          draft: false
          prerelease: false
          files: |
            ${{ steps.artifacts.outputs.dir }}/val-ark-*.bundle
            ${{ steps.artifacts.outputs.dir }}/val-ark-*.tar.gz
            ${{ steps.artifacts.outputs.dir }}/SHA256SUMS
