// Lightweight router profile: only content/sync/infra tools, never heavy

const OPENWRT_TOOLS = ['kiwix', 'syncthing', 'btop', 'ffmpeg', 'sqlite', 'dev-cli'];

// Derive per-tool status for the new platforms instead of editing every tool:
// thor/gb10 inherit the tool's jetson (arm64) status; openwrt is 'prebuilt'
// for allow-listed infra tools and 'n/a' for everything else.
function deriveToolPlatforms() {
    for (const tool of TOOLS) {
        const p = tool.platforms || (tool.platforms = {});
        for (const alias of ARM64_ALIAS_PLATFORMS) {
            if (p[alias] === undefined && p.jetson !== undefined) p[alias] = p.jetson;
        }
        if (p.openwrt === undefined) {
            p.openwrt = OPENWRT_TOOLS.includes(tool.id) ? (p.jetson || 'prebuilt') : 'n/a';
        }
    }
}

    'LLM': 'Large Language Model - AI that understands and generates text, like ChatGPT.',
    'GGUF': 'A file format for AI models that\'s efficient and portable. Think of it like MP3 for AI.',

    'context': 'How much text an AI can "remember" in a conversation. Measured in tokens (e.g., 4K = ~3000 words).',
    'inference': 'When an AI model generates a response. The actual "thinking" process.',
    'GPU': 'Graphics Processing Unit - makes AI run 10-50x faster than CPU alone.',
    'CUDA': 'NVIDIA\'s technology for running calculations on their GPUs.',
    'Metal': 'Apple\'s technology for running calculations on M-series Mac GPUs.',
    'embedding': 'Converting text into numbers that capture its meaning. Used for search and similarity.',
    'TTS': 'Text-to-Speech - converting written text into spoken audio.',
    'STT': 'Speech-to-Text - converting spoken audio into written text. Also called transcription.',
    'ONNX': 'A universal format for AI models that works across different frameworks.',
    'ZIM': 'A compressed file format for offline content like Wikipedia.',
    'API': 'Application Programming Interface - a way for programs to talk to each other.',
    'CLI': 'Command Line Interface - a text-based way to control software by typing commands.'
};

// Helper to wrap terms in glossary tooltips
function glossary(term, text) {
    const def = GLOSSARY[term];
    if (!def) return text || term;
    return `<span class="glossary-term" tabindex="0">${text || term}<span class="tooltip">${esc(def)}</span></span>`;
}

// Installation status for current instance (Jetson ARM64)
// Dynamic install status - checked against server on page load
const INSTALLED_TOOLS = {};
const TOOL_INFO = {}; // {toolId: {lastModified, size}}

// Check tool availability - tries API first, falls back to HEAD requests
async function checkInstalledTools() {
    try {
        const resp = await fetch('/api/status/tools');
        if (resp.ok) {
            const toolsData = await resp.json();
            checkInstalledToolsFromAPI(toolsData);
            scheduleRender();
            return;
        }
    } catch (e) {}
    await checkInstalledToolsFallback();
    scheduleRender();
}

function checkInstalledToolsFromAPI(toolsData) {
    // Map server tool directory names to TOOLS ids
    const toolDirMap = {};
    for (const t of TOOLS) {
        if (!t.downloads || !t.downloads.binaries) continue;
        const bins = t.downloads.binaries;
        for (const [, binPath] of Object.entries(bins)) {
            if (!binPath) continue;
            // Extract dir/file name from path like "tools/linux-arm64/llama-server"
            const cleaned = binPath.replace(/\/+$/, ''); // strip trailing slashes
            const parts = cleaned.split('/');
            if (parts.length >= 3) {
                const dirName = parts.slice(2).join('/');
                toolDirMap[dirName] = t.id;
                // Also try just the last segment
                toolDirMap[parts[parts.length - 1]] = t.id;
            }
        }
    }

    for (const [dirName, platforms] of Object.entries(toolsData)) {
        const toolId = toolDirMap[dirName];
        if (!toolId) continue;
        // Check content type across platforms
        let hasBinary = false;
        let hasSource = false;
        let hasHint = false;
        let newest = null;
        for (const [, info] of Object.entries(platforms)) {
            // Use new contentType field if available, fall back to legacy detection
            const ct = info.contentType || (info.installHint ? 'hint' : (info.files > 0 ? 'unknown' : 'empty'));
            if (ct === 'binary') hasBinary = true;
            else if (ct === 'source') hasSource = true;
            else if (ct === 'hint') hasHint = true;
            if (!newest || (info.lastModified && info.lastModified > newest.lastModified)) {
                newest = info;
            }
        }
        // Priority: binary > source > hint
        if (hasBinary) {
            INSTALLED_TOOLS[toolId] = 'installed';
        } else if (hasSource) {
            INSTALLED_TOOLS[toolId] = 'source';
        } else if (hasHint) {
            INSTALLED_TOOLS[toolId] = 'hint';
        }
        if (newest && INSTALLED_TOOLS[toolId]) {
            TOOL_INFO[toolId] = { lastModified: newest.lastModified, size: newest.size };
        }
    }

    // Also check sources directory entries (legacy support)
    if (toolsData['llama.cpp']?.source) { if (!INSTALLED_TOOLS['llama-cpp']) INSTALLED_TOOLS['llama-cpp'] = 'source'; }
    if (toolsData['whisper.cpp']?.source) { if (!INSTALLED_TOOLS['whisper-cpp']) INSTALLED_TOOLS['whisper-cpp'] = 'source'; }
    if (toolsData['stable-diffusion.cpp']?.source) { if (!INSTALLED_TOOLS['sd-cpp']) INSTALLED_TOOLS['sd-cpp'] = 'source'; }
    if (toolsData['BitNet']?.source) { if (!INSTALLED_TOOLS['bitnet']) INSTALLED_TOOLS['bitnet'] = 'source'; }

    // Mark remaining tools
    for (const t of TOOLS) {
        if (!INSTALLED_TOOLS[t.id]) {
            INSTALLED_TOOLS[t.id] = t.downloads?.installHint || 'missing';
        }
    }
}

async function checkInstalledToolsFallback() {
    const currentPlat = currentPlatform;

    const checks = TOOLS.map(async (t) => {
        if (!t.downloads) {
            INSTALLED_TOOLS[t.id] = 'missing';
            return;
        }
        const bins = t.downloads.binaries || {};
        const hasBinaries = Object.keys(bins).length > 0;

        if (!hasBinaries) {
            INSTALLED_TOOLS[t.id] = t.downloads.installHint || 'missing';
            return;
        }

        const allPaths = Object.values(bins).filter(p => p);
        if (allPaths.length === 0) {
            INSTALLED_TOOLS[t.id] = t.downloads.installHint || 'missing';
            return;
        }
        const binPath = bins[currentPlat];
        const pathsToTry = binPath ? [binPath, ...allPaths.filter(p => p !== binPath)] : allPaths;
        let found = false;
        for (const p of pathsToTry) {
            try {
                const r = await fetch(p, {method:'HEAD'});
                if (r.ok) { found = true; break; }
            } catch(e) {}
        }
        INSTALLED_TOOLS[t.id] = found ? 'installed' : 'missing';
    });

    const sourceChecks = [
        {id:'llama-cpp', path:'sources/llama.cpp/CMakeLists.txt'},
        {id:'whisper-cpp', path:'sources/whisper.cpp/CMakeLists.txt'},
        {id:'sd-cpp', path:'sources/stable-diffusion.cpp/CMakeLists.txt'},
        {id:'bitnet', path:'sources/BitNet/run_inference.py'}
    ].map(async (s) => {
        try {
            const r = await fetch(s.path, {method:'HEAD'});
            if (r.ok && INSTALLED_TOOLS[s.id] !== 'installed') {
                INSTALLED_TOOLS[s.id] = 'source';
            }
        } catch(e) {}
    });

    await Promise.all([...checks, ...sourceChecks]);
}

function getInstallBadge(toolId) {
    const status = INSTALLED_TOOLS[toolId] || 'checking';
    let badge = '';
    switch(status) {
        case 'installed': badge = '<span class="badge badge-installed">Mirrored</span>'; break;
        case 'system': badge = '<span class="badge badge-installed">System</span>'; break;
        case 'source': badge = '<span class="badge badge-source">Source Only</span>'; break;
        case 'bundled': badge = '<span class="badge badge-installed">Bundled</span>'; break;
        case 'hint': badge = '<span class="badge badge-hint">Install Guide</span>'; break;
        case 'npm': badge = '<span class="badge badge-hint">npm</span>'; break;
        case 'pip': badge = '<span class="badge badge-hint">pip</span>'; break;
        case 'docker': badge = '<span class="badge badge-hint">Docker</span>'; break;
        case 'package': badge = '<span class="badge badge-hint">System Package</span>'; break;
        case 'python': badge = '<span class="badge badge-hint">Python</span>'; break;
        case 'checking': badge = '<span class="badge badge-checking">Checking...</span>'; break;
        default: badge = '<span class="badge badge-missing">Not Mirrored</span>'; break;
    }
    const info = TOOL_INFO[toolId];
    if (info && info.lastModified) {
        const d = new Date(info.lastModified);
        const dateStr = d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
        badge += `<span class="last-updated">Updated: ${dateStr}</span>`;
    }
    return badge;
}

// Theme toggle (dark/light mode)

    const html = document.documentElement;
    const current = html.getAttribute('data-theme');
    const newTheme = current === 'light' ? null : 'light';
    if (newTheme) {
        html.setAttribute('data-theme', 'light');

function copyText(el) {
    let text = el.textContent || el.innerText;
    text = text.replace(/click to copy/gi, '').replace(/\bcopy\b/gi, '').replace(/\bcopied!\b/gi, '').trim();
    const doCopy = () => {
        // Visual feedback: flash the element
        el.classList.add('copied-flash');
        setTimeout(() => el.classList.remove('copied-flash'), 600);
        // Update hint text temporarily
        const hint = el.querySelector('.copy-hint');
        if (hint) {
            const orig = hint.textContent;
            hint.textContent = 'Copied!';
            hint.classList.add('copied');
            setTimeout(() => { hint.textContent = orig; hint.classList.remove('copied'); }, 1500);
        }
        showToast();
    };
    navigator.clipboard.writeText(text).then(doCopy).catch(() => {
        const ta = document.createElement('textarea');
        ta.value = text;
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
        doCopy();
    });
}

function showToast() {
    const toast = document.getElementById('copiedToast');
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2000);
}

function openLightbox(src, caption) {
    let lb = document.getElementById('lightboxOverlay');

        lb = document.createElement('div');
        lb.id = 'lightboxOverlay';

        lb.innerHTML = '<span class="lightbox-close">&times;</span><img><div class="lightbox-caption"></div>';
        lb.onclick = () => lb.classList.remove('active');
        document.body.appendChild(lb);
    }
    lb.querySelector('img').src = src;
    lb.querySelector('.lightbox-caption').textContent = caption || '';
    lb.classList.add('active');
}
document.addEventListener('keydown', e => {
    // Escape: Close modals, lightbox, or clear search
    if (e.key === 'Escape') {
        // Close keyboard help modal
        const kbModal = document.getElementById('keyboardHelpModal');
        if (kbModal && kbModal.classList.contains('visible')) {
            kbModal.classList.remove('visible');
            return;
        }
        // Close lightbox
        const lb = document.getElementById('lightboxOverlay');
        if (lb && lb.classList.contains('active')) {
            lb.classList.remove('active');
            return;
        }
        // Clear search if active
        const searchInput = document.getElementById('searchInput');
        if (searchInput && searchInput.value) {
            clearSearch();
            return;
        }
        // Close mobile nav if open
        const navLinks = document.querySelector('.nav-links.mobile-open');
        if (navLinks) {
            navLinks.classList.remove('mobile-open');
            const hamburger = document.querySelector('.nav-hamburger');
            if (hamburger) hamburger.classList.remove('open');
        }
    }
    // Slash key: Focus search (like GitHub)
    if (e.key === '/' && !e.ctrlKey && !e.metaKey && !['INPUT', 'TEXTAREA'].includes(document.activeElement?.tagName)) {
        e.preventDefault();
        const searchInput = document.getElementById('searchInput');
        if (searchInput) searchInput.focus();
    }
    // Question mark: Show keyboard shortcuts modal
    if (e.key === '?' && !['INPUT', 'TEXTAREA'].includes(document.activeElement?.tagName)) {
        toggleKeyboardHelp();
    }
});

// Download link handler - checks file exists before downloading
function handleDownload(event, path) {
    event.preventDefault();
    event.stopPropagation();
    const el = event.currentTarget;
    el.style.opacity = '0.5';
    fetch(path, {method: 'HEAD'}).then(r => {
        el.style.opacity = '1';
        if (r.ok) {
            const a = document.createElement('a');
            a.href = path;
            a.download = path.split('/').pop();
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        } else {
            showDownloadError(path, el);
        }
    }).catch(() => {
        el.style.opacity = '1';
        showDownloadError(path, el);
    });
}

function showDownloadError(path, el) {
    // Show inline error message
    let msg = el.closest('.detail-section, .qs-card, .card, .path-card');
    if (!msg) msg = el.parentElement;
    let existing = msg.querySelector('.dl-missing-msg');
    if (!existing) {
        existing = document.createElement('div');
        existing.className = 'dl-missing-msg';
        existing.innerHTML = `<strong>File not yet available:</strong> <code>${esc(path)}</code><br>Run <code>./update.sh</code> (tools) or <code>./download-all-models.sh</code> (models) to populate downloads.`;
        msg.appendChild(existing);
        setTimeout(() => existing.remove(), 8000);
    }
}

// Check download availability after page render
function checkDownloads() {
    document.querySelectorAll('a[download]').forEach(a => {
        const href = a.getAttribute('href');
        if (!href || href.startsWith('#')) return;
        fetch(href, {method: 'HEAD'}).then(r => {
            if (r.ok) {
                a.classList.add('dl-available');
                a.classList.remove('dl-missing');
            } else {
                a.classList.add('dl-missing');
                a.classList.remove('dl-available');
            }
        }).catch(() => {
            a.classList.add('dl-missing');
        });
    });
}

function getCommand(variant, family) {
    const p = PLATFORMS[currentPlatform];
    const s = p.sep;
    const modelPath = currentPlatform === 'windows' ? variant.file.replace(/\//g, '\\') : variant.file;
    const tool = family.tool;

    if (tool === 'llama.cpp') {
        if (family.category === 'Vision') {
            return `${p.toolsBase}${s}${p.llamaBin} -m ${p.modelsBase}${s}${modelPath} ${p.gpuFlag} --mmproj mmproj.gguf -c 4096 --port 8080`;
        }
        return `${p.toolsBase}${s}${p.llamaBin} -m ${p.modelsBase}${s}${modelPath} ${p.gpuFlag} -c 4096 --port 8080`;
    }
    if (tool === 'whisper.cpp') {
        return `${p.toolsBase}${s}${p.whisperBin} -m ${p.modelsBase}${s}${modelPath} -f audio.wav`;
    }
    if (tool === 'piper') {
        return `echo "Hello world" | ${p.toolsBase}${s}${p.piperBin} --model ${p.modelsBase}${s}${modelPath} --output_file out.wav`;
    }
    if (tool === 'sd.cpp') {
        return `${p.toolsBase}${s}${p.sdBin} -m ${p.modelsBase}${s}${modelPath} -p "a photo of a cat" -o output.png`;
    }
    if (tool === 'onnxruntime') {
        if (family.category === 'TTS') {
            return `python3 kokoro_tts.py --model ${p.modelsBase}${s}${modelPath} --text "Hello world" --output out.wav`;
        }
        if (family.category === 'STT') {
            return `python3 moonshine_transcribe.py --model ${p.modelsBase}${s}${modelPath} --audio recording.wav`;
        }
        return `python3 run_onnx.py --model ${p.modelsBase}${s}${modelPath}`;
    }
    if (tool === 'vosk') {
        return `python3 vosk_transcribe.py --model-path ${p.modelsBase}${s}${modelPath} --input audio.wav`;
    }
    if (tool === 'python') {
        if (family.slug === 'coqui-xtts') {
            return `python3 -m TTS --model_path ${p.modelsBase}${s}${modelPath} --text "Hello world" --speaker_wav speaker.wav --out_path output.wav`;
        }
        if (family.slug === 'other-tts') {
            return `python3 tts_generate.py --model ${p.modelsBase}${s}${modelPath} --text "Hello world" --output output.wav`;
        }
        return `python3 run_model.py --model ${p.modelsBase}${s}${modelPath}`;
    }
    if (tool === 'nemo/python') {
        if (family.category === 'STT' || variant.name.includes('Canary') || variant.name.includes('Parakeet')) {
            return `python3 nemo_asr.py --model ${p.modelsBase}${s}${modelPath} --audio recording.wav`;
        }
        return `python3 nemo_inference.py --model ${p.modelsBase}${s}${modelPath}`;
    }
    return `# Run: see ${tool} documentation for usage`;
}

function getRoute() {
    const hash = window.location.hash || '#/';
    return hash.replace(/^#/, '') || '/';
}

function router() {
    let route = getRoute();
    // #/library is the friendlier alias for the content section (it holds Wikipedia
    // plus StackExchange, wikis, textbooks, courses & more — a whole offline library,
    // not just Wikipedia). Keep #/content working for any existing links/bookmarks.
    if (route === '/library') route = '/content';
    else if (route.startsWith('/library/')) route = '/content/' + route.slice('/library/'.length);
    const app = document.getElementById('app-root');

    let html = renderNav(route);

    if (route === '/') {
        html += renderHome();
    } else if (route === '/community') {
        html += renderCommunity();
    } else if (route === '/tools') {
        html += renderToolsList();
    } else if (route === '/tools/ollama') {
        html += renderOllama();
    } else if (route.startsWith('/tools/')) {
        const toolId = route.replace('/tools/', '');
        html += renderToolDetail(toolId);
    } else if (route === '/models') {
        html += renderModelsList();
    } else if (route.startsWith('/models/')) {
        const slug = route.replace('/models/', '');
        html += renderModelDetail(slug);
    } else if (route === '/content') {
        html += renderContentLibrary();
    } else if (route.startsWith('/content/')) {
        const contentId = route.replace('/content/', '');
        html += renderContentDetail(contentId);
    } else if (route.startsWith('/app/')) {
        html += renderServiceFrame(route.replace('/app/', ''));
    } else if (route === '/quickstart') {
        html += renderQuickStart();
    } else if (route === '/glossary') {
        html += renderGlossary();
    } else {
        html += renderHome();
    }

    html += renderFooter();
    app.innerHTML = html;
    window.scrollTo(0, 0);

    // Rebind search if present
    const searchInput = document.getElementById('searchInput');
    if (searchInput) {
        searchInput.addEventListener('input', () => {
            const term = searchInput.value.toLowerCase();
            filterCards(term);
        });
    }

    // Once per navigation (not on every rAF repaint): pull the live catalog for the
    // browse panels and refresh community-service status for the Community hub.
    if (route !== _lastRoute) {
        _lastRoute = route;
        if (route === '/content') loadCatalog('content');
        else if (route === '/models') loadCatalog('models');
        else if (route === '/community') refreshServices();
    }

    // Check download link availability after render
    setTimeout(checkDownloads, 100);
}
let _lastRoute = null;

        html += '</div></div>';
    });

    html += '</div>';
    return html;
}

function filterCards(term) {
    let visibleCount = 0;
    let totalCount = 0;
    document.querySelectorAll('.card').forEach(card => {
        totalCount++;
        const searchData = (card.getAttribute('data-search') || '').toLowerCase();
        const isMatch = !term || searchData.includes(term);
        card.style.display = isMatch ? '' : 'none';
        if (isMatch) visibleCount++;
    });

    // Update search status and clear button
    const clearBtn = document.getElementById('searchClear');
    const statusEl = document.getElementById('searchStatus');
    if (clearBtn) clearBtn.style.display = term ? 'block' : 'none';
    if (statusEl) {
        if (term) {
            if (visibleCount === 0) {
                statusEl.innerHTML = `<span class="search-no-results">No results for "<strong>${esc(term)}</strong>"</span> <span style="color:var(--text-muted)">Try: llama, whisper, image, voice</span>`;
                statusEl.style.display = 'block';
            } else {
                statusEl.innerHTML = `Found <strong>${visibleCount}</strong> ${visibleCount === 1 ? 'item' : 'items'} matching "<strong>${esc(term)}</strong>"`;
                statusEl.style.display = 'block';
            }
        } else {
            statusEl.style.display = 'none';
        }
    }
}

function clearSearch() {
    const input = document.getElementById('searchInput');
    if (input) {
        input.value = '';
        input.focus();
        filterCards('');
    }
}

    Object.entries(grouped).forEach(([catId, tools]) => {

    const relatedModels = MODEL_FAMILIES.filter(f => f.tool === tool.name || f.tool === toolId.replace('-', '.'));
    if (relatedModels.length) {
        html += '<div class="detail-section"><h2>Models Using This Tool</h2><div class="related-links">';

            html += `<a href="#/models/${f.slug}" class="related-link">${esc(f.family)}</a>`;

    // Related tools in same category
    const relatedTools = TOOLS.filter(t => t.category === tool.category && t.id !== toolId).slice(0, 6);

    html += '</div>';

// Check content download status
const CONTENT_STATUS = {};
const CONTENT_INFO = {}; // {filename: {size, lastModified}}

// Presence match that survives the mirror rotating ZIM dates. Kiwix filenames carry
// a build date (wikipedia_en_all_maxi_2026-02.zim), so an exact-filename check would
// wrongly report a present collection as "Not Mirrored". Match the stable pattern
// (item.match) against the live content keys instead. Returns the matched {info} or false.
function contentPresent(item, contentData) {
    if (!contentData) return false;
    if (item.match) {
        let re; try { re = new RegExp(item.match, 'i'); } catch (_) { re = null; }
        if (re) for (const k in contentData) { if (re.test(k)) return { info: contentData[k] }; }
        return false;
    }
    const relPath = item.file.replace(/^content\//, '');
    return contentData[relPath] ? { info: contentData[relPath] } : false;
}

async function checkContentStatus() {
    try {
        const resp = await fetch('/api/status/content');
        if (resp.ok) {
            const contentData = await resp.json();
            for (const item of CONTENT_LIBRARY) {
                const hit = contentPresent(item, contentData);
                if (hit) {
                    CONTENT_STATUS[item.id] = 'installed';
                    CONTENT_INFO[item.id] = hit.info;
                } else {
                    CONTENT_STATUS[item.id] = 'missing';
                }
            }
            scheduleRender();
            return;
        }
    } catch (e) {}
    // Fallback: parallel HEAD requests
    await Promise.all(CONTENT_LIBRARY.map(async (item) => {
        try {
            const resp = await fetch(item.file, { method: 'HEAD' });
            CONTENT_STATUS[item.id] = resp.ok ? 'installed' : 'missing';
        } catch { CONTENT_STATUS[item.id] = 'missing'; }
    }));
    scheduleRender();
}

// =============================================================================
// API / SSE / DOWNLOAD MANAGEMENT
// =============================================================================
let _apiAvailable = false;
let _sseConnection = null;
let _diskData = null;
let _kiwixStatus = null; // {running, port, url, path, files}
let _storageData = null; // {categories:[{key,label,color,bytes}], total, zimCount, disk} — live, includes ZIMs
let _servicesStatus = null; // {id:{port,path,running}} — community sub-apps (chat/mail/forum/paste)
let _tlsStatus = null; // {enabled, httpsPort, caDownload, domain, notAfter, ...} — local-CA HTTPS
const _activeDownloads = new Map();

// Kiwix is reverse-proxied at /kiwix/ on this same origin, so the link works on
// whatever host/port the user reached Val Ark by (Tailscale, WiFi IP, :8088…)
// AND keeps the Val Ark header. Fall back to the direct port for older servers
// that didn't report a proxy path.
// Security notice: when the Ark has a local-CA cert and you're on plain HTTP,
// offer the one-click CA download + a switch to HTTPS. Honest about scope: this
// encrypts traffic on the network, it does NOT hide data from the operator.
function renderSecurityNotice() {
    if (!_tlsStatus) return '';
    const onHttps = location.protocol === 'https:';
    const host = location.hostname || 'localhost';
    const ca = _tlsStatus.caDownload || '/ca.crt';
    if (_tlsStatus.enabled && !onHttps) {
        const httpsUrl = `https://${host}:${_tlsStatus.httpsPort}${location.pathname}${location.hash}`;
        return `<div class="tls-banner">
            <div class="tls-banner-main">
                <span class="tls-banner-icon">&#x1F512;</span>
                <div>
                    <div class="tls-banner-title">Encrypted HTTPS is available on this Ark</div>
                    <div class="tls-banner-desc">You're on an unencrypted connection. Install this Ark's certificate once, then switch to HTTPS so chat, mail and everything else is encrypted on your network. <strong>Note:</strong> this protects traffic on the network — it does not hide data from the Ark's operator.</div>
                </div>
            </div>
            <div class="tls-banner-actions">
                <a class="tls-btn" href="${ca}" download>Download certificate</a>
                <a class="tls-btn tls-btn-primary" href="${httpsUrl}">Switch to HTTPS &#x2192;</a>
            </div>
        </div>`;
    }
    if (onHttps) {
        return `<div class="tls-banner tls-banner-ok">
            <span class="tls-banner-icon">&#x1F512;</span>
            <div class="tls-banner-desc"><strong>Encrypted connection</strong> (Val Ark local CA). Traffic on your network is protected; data at rest is not hidden from the operator. <a href="${ca}" download>Get the certificate for your other devices</a>.</div>
        </div>`;
    }
    return '';
}

function getKiwixUrl() {
    if (!_kiwixStatus || !_kiwixStatus.running) return null;
    if (_kiwixStatus.path) return _kiwixStatus.path; // '/kiwix/' — relative, same-origin
    const host = window.location.hostname || 'localhost';
    return `http://${host}:${_kiwixStatus.port || 8888}/`;
}

// Generic "sub-app in a frame" — embeds another local service (the Kiwix library
// today; webmail / chat / forums as they're added) BELOW the fixed Val Ark nav,
// so every sub-app shares one consistent header that links back to the ark.
function renderAppFrame(opts) {
    const id = opts.id || 'appFrame';
    const src = opts.src || 'about:blank';
    const title = esc(opts.title || 'App');
    const subtitle = opts.subtitle ? `<span class="subapp-sub">${esc(opts.subtitle)}</span>` : '';
    // Status dot reflects reality: green=up, red=down, grey=unknown — so a downed
    // service can't masquerade as "running" behind a stale green dot.
    const status = opts.status || 'up';
    const dotClass = status === 'down' ? ' down' : status === 'unknown' ? ' unknown' : '';
    return `<div class="subapp" id="${id}-wrap">
        <div class="subapp-bar">
            <div class="subapp-id"><span class="subapp-dot${dotClass}" title="${status}"></span><strong>${title}</strong>${subtitle}</div>
            <div class="subapp-actions">
                <button class="subapp-btn" onclick="reloadFrame('${id}')" title="Reload" aria-label="Reload frame">&#x21bb;</button>
                <button class="subapp-btn" onclick="toggleFrameFullscreen('${id}')" title="Fullscreen (Esc to exit)" aria-label="Toggle fullscreen">&#x26F6; Fullscreen</button>
                <a class="subapp-btn" href="${src}" target="_blank" rel="noopener" title="Open in a new tab">Open &#x2197;</a>
            </div>
        </div>
        <iframe id="${id}" class="subapp-frame" src="${src}" title="${title}" loading="lazy"></iframe>
    </div>`;
}
function reloadFrame(id) { const f = document.getElementById(id); if (f) f.src = f.src; }
function toggleFrameFullscreen(id) {
    const f = document.getElementById(id);
    const wrap = f && f.closest('.subapp');
    if (!wrap) return;
    const on = wrap.classList.toggle('fullscreen');
    document.body.classList.toggle('subapp-fullscreen-open', on);
}
// Esc exits any fullscreened sub-app frame (the fixed nav stays put regardless).
document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape' && document.querySelector('.subapp.fullscreen')) {
        document.querySelectorAll('.subapp.fullscreen').forEach(w => w.classList.remove('fullscreen'));
        document.body.classList.remove('subapp-fullscreen-open');
    }
});

// Debounced router: prevents multiple rapid full-page re-renders
let _routerTimer = null;
function scheduleRender() {
    if (_routerTimer) return;
    _routerTimer = requestAnimationFrame(() => { _routerTimer = null; router(); });
}

function formatBytes(bytes) {
    if (!bytes || bytes === 0) return '0 B';
    const units = ['B', 'KB', 'MB', 'GB', 'TB'];
    const i = Math.floor(Math.log(bytes) / Math.log(1024));
    return (bytes / Math.pow(1024, i)).toFixed(i > 1 ? 1 : 0) + ' ' + units[i];
}

// Storage Breakdown — uses LIVE sizes from /api/status/storage (which include
// the ZIM library, models, tools, installers and sources) once they arrive;
// falls back to the static estimate for first paint / API-less file:// use.
function renderStorageBreakdown() {
    let cats, total, totalLabel;
    if (_storageData && _storageData.categories && _storageData.categories.length) {
        cats = _storageData.categories.map(c => ({ label: c.label, bytes: c.bytes, color: c.color }));
        total = _storageData.total || cats.reduce((s, c) => s + c.bytes, 0);
        totalLabel = formatBytes(total);
    } else {
        cats = STORAGE_DATA.map(d => ({ label: d.label, bytes: d.size * 1073741824, color: d.color }));
        total = cats.reduce((s, c) => s + c.bytes, 0);
        totalLabel = '~' + STORAGE_DATA.reduce((s, d) => s + d.size, 0) + ' GB';
    }
    if (total <= 0) return '';
    let html = `<div class="storage-section"><h3>Storage Breakdown (${totalLabel} total)</h3>`;
    html += '<div class="storage-bar-container">';
    cats.forEach(c => {
        // Clamp tiny-but-present slices to a visible sliver — a fresh mirror's
        // first megabytes would otherwise round to width:0 and vanish.
        const pct = Math.max(c.bytes / total * 100, c.bytes > 0 ? 0.4 : 0);
        html += `<div class="storage-segment" style="width:${pct.toFixed(1)}%;background:${c.color}" title="${esc(c.label)}: ${formatBytes(c.bytes)}">${pct >= 6 ? formatBytes(c.bytes) : ''}</div>`;
    });
    html += '</div><div class="storage-legend">';
    cats.forEach(c => {
        html += `<div class="storage-legend-item"><div class="storage-dot" style="background:${c.color}"></div>${esc(c.label)} (${formatBytes(c.bytes)})</div>`;
    });
    html += '</div></div>';
    return html;
}

// Fetch all status in a single request, populate all state, render once
async function initFromAPI() {
    try {
        const resp = await fetch('/api/status/all');
        if (!resp.ok) return false;
        _apiAvailable = true;
        const data = await resp.json();

        // Populate disk
        _diskData = data.disk;

        // Populate tools
        if (data.tools) checkInstalledToolsFromAPI(data.tools);

        // Populate content
        if (data.content) {
            for (const item of CONTENT_LIBRARY) {
                const hit = contentPresent(item, data.content);
                if (hit) {
                    CONTENT_STATUS[item.id] = 'installed';
                    CONTENT_INFO[item.id] = hit.info;
                } else {
                    CONTENT_STATUS[item.id] = 'missing';
                }
            }
        }

        // Populate kiwix status
        if (data.kiwix) {
            _kiwixStatus = data.kiwix;
        }

        // Single render after all data populated
        scheduleRender();

        // Live storage breakdown (includes ZIMs/tools/installers, not just
        // models). The server computes it with a background du walk, so the first
        // response may be empty ({computing:true}); retry a few times until the
        // real numbers land, then refine the breakdown without blocking paint.
        const loadStorage = (tries) => fetch('/api/status/storage')
            .then(r => r.ok ? r.json() : null)
            .then(s => {
                if (s && s.categories && s.categories.length) { _storageData = s; scheduleRender(); }
                else if (tries > 0) setTimeout(() => loadStorage(tries - 1), 5000);
            })
            .catch(() => {});
        loadStorage(24);  // the tools tree (~45k files) can take ~75s to size over FUSE

        // Community sub-app liveness (so detail pages show "Launch" vs "how to start").
        fetch('/api/status/services')
            .then(r => r.ok ? r.json() : null)
            .then(s => { if (s && Object.keys(s).length) { _servicesStatus = s; scheduleRender(); } })
            .catch(() => {});

        // Local-CA TLS status (drives the "switch to HTTPS / trust this Ark" banner).
        fetch('/api/status/tls')
            .then(r => r.ok ? r.json() : null)
            .then(t => { if (t) { _tlsStatus = t; scheduleRender(); } })
            .catch(() => {});
        return true;
    } catch (e) {
        return false;
    }
}

function renderDiskBar() {
    if (!_diskData) return '';
    const pct = _diskData.total > 0 ? ((_diskData.total - _diskData.available) / _diskData.total * 100) : 0;
    const cls = pct > 90 ? 'critical' : pct > 75 ? 'warn' : '';
    return `<div class="nav-disk-bar"><div class="nav-disk-fill ${cls}" style="width:${pct.toFixed(1)}%"></div></div>
        <span>${formatBytes(_diskData.available)} free / ${formatBytes(_diskData.total)}</span>`;
}

function connectSSE() {
    if (_sseConnection) return;
    try {
        _sseConnection = new EventSource('/api/downloads/stream');
        _sseConnection.addEventListener('init', () => { /* connected */ });
        _sseConnection.addEventListener('start', (e) => {
            const data = JSON.parse(e.data);
            _activeDownloads.set(data.id, { ...data, progress: 0, lastLine: '', status: 'running' });
            renderProgressPanel();
        });
        _sseConnection.addEventListener('progress', (e) => {
            const data = JSON.parse(e.data);
            const dl = _activeDownloads.get(data.id);
            if (dl) {
                dl.progress = data.progress;
                dl.lastLine = data.line;
                renderProgressPanel();
            }
        });
        _sseConnection.addEventListener('complete', (e) => {
            const data = JSON.parse(e.data);
            const dl = _activeDownloads.get(data.id);
            if (dl) {
                dl.status = data.status;
                renderProgressPanel();
                if (data.status === 'complete') {
                    const panel = document.getElementById('dl-panel');
                    if (panel) { panel.classList.add('success'); setTimeout(() => panel.classList.remove('success'), 1500); }
                    // Refresh all status in one call
                    initFromAPI();
                }
                setTimeout(() => { _activeDownloads.delete(data.id); renderProgressPanel(); }, 5000);
            }
        });
        _sseConnection.onerror = () => {
            _sseConnection.close();
            _sseConnection = null;
            // Reconnect after 5s delay
            setTimeout(connectSSE, 5000);
        };
    } catch (e) {}
}

async function triggerDownload(type, target) {
    if (!_apiAvailable) return;
    // Check disk space
    if (_diskData && _diskData.available < 1024 * 1024 * 1024) {
        alert('Insufficient disk space (less than 1 GB free)');
        return;
    }

    const endpoint = type === 'update' ? '/api/download/update' :
                     type === 'content' ? '/api/download/content' :
                     type === 'models' ? '/api/download/models' :
                     '/api/download/tools';
    const body = type === 'content' ? { target } :
                 type === 'models' ? { tier: target } :
                 { target };
    try {
        const resp = await fetch(endpoint, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body),
        });
        const result = await resp.json();
        if (result.error) {
            alert(result.error);
        }
    } catch (e) {
        alert('Failed to start installation: ' + e.message);
    }
}

// --- One-click per-item requests + community-service start (LAN/tailnet) --------
// Downloads that aren't mirrored yet: a specific ZIM (incl. full Wikipedia), a
// curated model, or an app. Routed through /api/request -> librarian, which pins
// the item and auto-evicts lowest-priority unpinned content to fit the footprint
// cap. Progress + auto-refresh come free via the same SSE panel as triggerDownload.
async function triggerRequest(kind, id, btn) {
    if (!_apiAvailable) { alert('The Val Ark API is not reachable from this page.'); return; }
    if (_diskData && _diskData.available < 1024 * 1024 * 1024) {
        // The librarian will still try to evict to fit, but warn on a truly full disk.
        if (!confirm('Very little free space. The librarian will evict lower-priority content to make room. Continue?')) return;
    }
    if (btn) { btn.dataset.o = btn.innerHTML; btn.disabled = true; btn.innerHTML = '<span class="spinner"></span> Requesting…'; }
    try {
        const resp = await fetch('/api/request', {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ kind, id }),
        });
        const result = await resp.json();
        if (result.error) {
            alert(result.error);
            if (btn) { btn.disabled = false; btn.innerHTML = btn.dataset.o; }
        } else if (btn) {
            btn.innerHTML = 'Requested ✓';   // SSE panel now shows live progress
        }
    } catch (e) {
        alert('Failed to start request: ' + e.message);
        if (btn) { btn.disabled = false; btn.innerHTML = btn.dataset.o; }
    }
}
function triggerRequestFromEl(btn) {
    triggerRequest(btn.getAttribute('data-kind'), btn.getAttribute('data-id'), btn);
}

// Bring up an enabled + mirrored community service, then poll until it answers.
async function startCommunityService(id, btn) {
    if (btn) { btn.dataset.o = btn.innerHTML; btn.disabled = true; btn.innerHTML = '<span class="spinner"></span> Starting…'; }
    try {
        const resp = await fetch('/api/service/start', {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ id }),
        });
        const result = await resp.json();
        if (result.error) {
            alert(result.error);
            if (btn) { btn.disabled = false; btn.innerHTML = btn.dataset.o; }
            return;
        }
        if (_servicesStatus && _servicesStatus[id]) _servicesStatus[id].starting = true;
        pollServiceUp(id, 90);   // forum/chat first-run builds take minutes
    } catch (e) {
        alert('Failed to start service: ' + e.message);
        if (btn) { btn.disabled = false; btn.innerHTML = btn.dataset.o; }
    }
}
function pollServiceUp(id, tries) {
    fetch('/api/status/services').then(r => r.json()).then(s => {
        if (s && Object.keys(s).length) { _servicesStatus = s; scheduleRender(); }
        if (s && s[id] && s[id].running) return;
        if (tries > 0) setTimeout(() => pollServiceUp(id, tries - 1), 2000);
    }).catch(() => { if (tries > 0) setTimeout(() => pollServiceUp(id, tries - 1), 2000); });
}
function refreshServices() {
    fetch('/api/status/services').then(r => r.ok ? r.json() : null)
        .then(s => { if (s && Object.keys(s).length) { _servicesStatus = s; scheduleRender(); } })
        .catch(() => {});
}

// --- Catalog browse: not-yet-downloaded resources you can one-click request ----
const _catalogData = { content: null, models: null };
function renderCatalogSection(kind, title, blurb) {
    return `<div class="detail-section catalog-section" style="margin-top:2.5rem">
        <h2 style="font-size:1.2em">${esc(title)}</h2>
        <p class="section-desc">${blurb}</p>
        <input type="text" class="catalog-search" id="catalog-${kind}-search"
            placeholder="Search the ${esc(kind === 'content' ? 'library catalog' : 'model catalog')}…"
            oninput="filterCatalog('${kind}', this.value)" aria-label="Search catalog">
        <div id="catalog-${kind}" class="cards-grid catalog-grid" data-catalog="${kind}">
            <div class="catalog-loading">Loading the live catalog…</div>
        </div>
        <div id="catalog-${kind}-more" class="catalog-more"></div>
    </div>`;
}
function loadCatalog(kind) {
    const mount = document.getElementById('catalog-' + kind);
    if (!mount) return;
    if (_catalogData[kind]) { renderCatalogItems(kind, _catalogData[kind], ''); return; }
    if (!_apiAvailable) { mount.innerHTML = '<div class="catalog-loading">Catalog needs the Val Ark server (open this page from the Ark).</div>'; return; }
    fetch('/api/catalog/' + kind).then(r => r.json()).then(d => {
        if ((!d.items || !d.items.length) && d.computing) {
            mount.innerHTML = '<div class="catalog-loading">Building the catalog from the live index… this takes a moment.</div>';
            setTimeout(() => { _catalogData[kind] = null; loadCatalog(kind); }, 4000);
            return;
        }
        _catalogData[kind] = d.items || [];
        renderCatalogItems(kind, _catalogData[kind], '');
    }).catch(() => { mount.innerHTML = '<div class="catalog-loading">Catalog unavailable (offline?).</div>'; });
}
function catalogCardHtml(kind, it) {
    const rk = kind === 'models' ? 'model' : 'content';
    return `<div class="card catalog-card" data-search="${esc((it.name + ' ' + it.id + ' ' + it.category).toLowerCase())}">
        <h3 style="font-size:0.92em;word-break:break-word">${esc(it.name)}</h3>
        <div class="card-meta">
            <span class="tag">${esc(it.category)}</span>
            <span>${formatBytes(it.bytes)}</span>
        </div>
        <button class="dl-action-btn" data-kind="${rk}" data-id="${esc(it.id)}" onclick="triggerRequestFromEl(this)">Download</button>
    </div>`;
}
function renderCatalogItems(kind, items, term) {
    const mount = document.getElementById('catalog-' + kind);
    if (!mount) return;
    term = (term || '').toLowerCase();
    const filtered = term ? items.filter(it => (it.name + ' ' + it.id + ' ' + it.category).toLowerCase().includes(term)) : items;
    const CAP = 120;
    const shown = filtered.slice(0, CAP);
    mount.innerHTML = shown.length ? shown.map(it => catalogCardHtml(kind, it)).join('')
        : '<div class="catalog-loading">No matching items.</div>';
    const more = document.getElementById('catalog-' + kind + '-more');
    if (more) {
        more.innerHTML = filtered.length > CAP
            ? `<span>Showing ${CAP} of ${filtered.length.toLocaleString()} — refine your search to narrow it down.</span>`
            : (filtered.length ? `<span>${filtered.length.toLocaleString()} item${filtered.length > 1 ? 's' : ''} available</span>` : '');
    }
}
function filterCatalog(kind, term) { renderCatalogItems(kind, _catalogData[kind] || [], term); }

// Community hub — the discoverable home for the offline LAN comms services.
function renderCommunity() {
    const svc = _servicesStatus || {};
    let html = '<div class="container" id="main-content">';
    html += renderBreadcrumb([{ label: 'Community' }]);
    html += '<h1>Community &amp; Comms</h1>';
    html += '<p class="section-desc">Talk to everyone on the network — no internet, no accounts, no federation. Chat, mail, message boards and file sharing all run right here on Val Ark and stay on your LAN.</p>';
    html += '<div class="cards-grid">';
    const services = TOOLS.filter(t => t.category === 'community');
    for (const t of services) {
        const s = svc[t.id] || {};
        let badge, action;
        if (s.running) {
            badge = '<span class="svc-badge svc-on">● Online</span>';
            action = `<a href="#/app/${t.id}" class="dl-action-btn">Open ${esc(COMMUNITY_NAV_LABELS[t.id] || t.name)} →</a>`;
        } else if (s.starting) {
            badge = '<span class="svc-badge svc-starting">● Starting…</span>';
            action = '<button class="dl-action-btn" disabled><span class="spinner"></span> Starting…</button>';
        } else if (s.startable) {
            badge = '<span class="svc-badge svc-off">○ Offline</span>';
            action = `<button class="dl-action-btn" onclick="startCommunityService('${t.id}',this)">Start service</button>`;
        } else if (_apiAvailable && s.mirrored === false) {
            badge = '<span class="svc-badge svc-off">○ Not mirrored</span>';
            action = `<span class="svc-hint">Mirror it: <code>scripts/tools/${t.id}.sh</code></span>`;
        } else if (_apiAvailable && s.enabled === false) {
            badge = '<span class="svc-badge svc-off">○ Offline</span>';
            action = `<span class="svc-hint">Enable in <code>.env</code>: add <code>${t.id}</code> to <code>VALARK_SERVICES</code></span>`;
        } else {
            badge = '<span class="svc-badge svc-off">○ Offline</span>';
            action = `<a href="#/app/${t.id}" class="dl-action-btn">Open →</a>`;
        }
        html += `<div class="card community-card">
            <div class="card-icon" style="background:${t.iconBg}">${t.icon}</div>
            <h3>${esc(t.name)} ${badge}</h3>
            <div class="card-desc">${esc(t.desc)}</div>
            <div class="community-action">${action}</div>
            <a href="#/tools/${t.id}" class="community-about">About &amp; setup →</a>
        </div>`;
    }
    html += '</div>';
    html += `<div class="detail-section" style="margin-top:2rem"><h3>How the community layer works</h3>
        <p>Each service runs LAN-bound on Val Ark and appears framed inside this site — the top nav stays put as a permanent way back. They make zero internet calls: no relays, no federation, no accounts anywhere else. Turn on the ones you want with <code>VALARK_SERVICES</code> in <code>.env</code>; the self-healing loop keeps them running and restarts any that stop.</p></div>`;
    html += '</div>';
    return html;
}

async function cancelDownload(id) {
    try {
        await fetch('/api/download/cancel', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ id }),
        });
    } catch (e) {}
}

function renderProgressPanel() {
    let panel = document.getElementById('dl-panel');
    if (!panel) {
        panel = document.createElement('div');
        panel.id = 'dl-panel';
        panel.className = 'dl-panel';
        document.body.appendChild(panel);
    }

    if (_activeDownloads.size === 0) {
        panel.classList.remove('visible');
        return;
    }

    panel.classList.add('visible');
    let html = '<div class="dl-panel-header"><span>Downloads</span><span style="font-size:0.75em;color:var(--text-muted)">' + _activeDownloads.size + ' active</span></div>';
    html += '<div class="dl-panel-body">';
    for (const [id, dl] of _activeDownloads) {
        const statusIcon = dl.status === 'complete' ? ' &#x2713;' :
                          dl.status === 'failed' ? ' &#x2717;' :
                          dl.status === 'cancelled' ? ' &#x2014;' : '';
        html += `<div class="dl-item">
            <div class="dl-item-header">
                <span class="dl-item-type">${dl.type}${statusIcon}</span>
                ${dl.status === 'running' ? `<button class="dl-cancel-btn" onclick="cancelDownload('${id}')">Cancel</button>` : ''}
            </div>
            <div class="dl-progress-bar"><div class="dl-progress-fill" style="width:${dl.progress}%"></div></div>
            <div class="dl-item-line">${((dl.lastLine || (dl.status === 'running' ? 'Starting...' : dl.status)) + '').slice(0, 60)}</div>
        </div>`;
    }
    html += '</div>';
    panel.innerHTML = html;
}

window.addEventListener('hashchange', router);
window.addEventListener('DOMContentLoaded', async () => {
    if (!window.location.hash) window.location.hash = '#/';
    router();

    // Show loading indicator
    const diskEl = document.getElementById('nav-disk');
    if (diskEl) diskEl.innerHTML = '<span class="loading-indicator">Loading...</span>';

    // Try combined API first (single request, single re-render)
    const apiOk = await initFromAPI();
    if (apiOk) {
        connectSSE();
    } else {
        // Try disk endpoint individually (may be available even if /api/status/all is not)
        try {
            const diskResp = await fetch('/api/status/disk');
            if (diskResp.ok) {
                _diskData = await diskResp.json();
                const diskEl = document.getElementById('nav-disk');
                if (diskEl) diskEl.innerHTML = renderDiskBar();
            }
        } catch (e) {}
        // Fallback: HEAD-request probing (no API server)
        await checkInstalledToolsFallback();
        // Parallelize content HEAD checks
        await Promise.all(CONTENT_LIBRARY.map(async (item) => {
            try {
                const resp = await fetch(item.file, { method: 'HEAD' });
                CONTENT_STATUS[item.id] = resp.ok ? 'installed' : 'missing';
            } catch { CONTENT_STATUS[item.id] = 'missing'; }
        }));
        scheduleRender();
    }
});
</script>
