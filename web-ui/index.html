<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Val Ark - Complete Offline Software Toolkit</title>
<style>
:root {
    --bg-primary: #0a0e14;
    --bg-secondary: #131921;
    --bg-tertiary: #1a2230;
    --bg-card: #151d28;
    --bg-card-hover: #1a2435;
    --border: #2a3545;
    --border-hover: #3a4f6a;
    --text-primary: #e8edf4;
    --text-secondary: #8b9bb4;
    --text-muted: #5a6a80;
    --accent: #4da6ff;
    --accent-dim: rgba(77,166,255,0.12);
    --green: #4ade80;
    --green-dim: rgba(74,222,128,0.12);
    --yellow: #fbbf24;
    --yellow-dim: rgba(251,191,36,0.12);
    --orange: #fb923c;
    --red: #f87171;
    --purple: #a78bfa;
    --purple-dim: rgba(167,139,250,0.12);
    --pink: #f472b6;
    --cyan: #22d3ee;
    --badge-top: #2563eb;
    --radius: 10px;
    --radius-sm: 6px;
    --shadow: 0 4px 24px rgba(0,0,0,0.3);
    --mono: 'SF Mono', 'Fira Code', 'JetBrains Mono', 'Cascadia Code', monospace;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', Helvetica, Arial, sans-serif;
    background: var(--bg-primary);
    color: var(--text-primary);
    line-height: 1.6;
    min-height: 100vh;
    padding-top: 60px;
}

/* Sticky Nav */
.top-nav {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    height: 60px;
    background: var(--bg-secondary);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 24px;
    z-index: 100;
    gap: 24px;
}
.nav-logo {
    font-size: 1.3em;
    font-weight: 800;
    color: var(--text-primary);
    cursor: pointer;
    white-space: nowrap;
    letter-spacing: -0.5px;
}
.nav-links {
    display: flex;
    gap: 4px;
    background: var(--bg-tertiary);
    border-radius: var(--radius-sm);
    padding: 3px;
}
.nav-link {
    padding: 6px 16px;
    border: none;
    border-radius: 4px;
    background: transparent;
    color: var(--text-secondary);
    cursor: pointer;
    font-size: 0.85em;
    font-weight: 500;
    transition: all 0.2s;
    white-space: nowrap;
}
.nav-link:hover { color: var(--text-primary); background: var(--bg-card); }
.nav-link.active { background: var(--accent-dim); color: var(--accent); font-weight: 600; }

/* Container */
.container { max-width: 1440px; margin: 0 auto; padding: 20px 24px; }

/* Breadcrumb */
.breadcrumb {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 12px 0;
    font-size: 0.85em;
    color: var(--text-muted);
    margin-bottom: 12px;
}
.breadcrumb a {
    color: var(--text-secondary);
    text-decoration: none;
    transition: color 0.2s;
}
.breadcrumb a:hover { color: var(--accent); }
.breadcrumb .sep { color: var(--text-muted); }
.breadcrumb .current { color: var(--text-primary); font-weight: 500; }

/* Hero */
.hero {
    text-align: center;
    padding: 40px 20px 28px;
    margin-bottom: 24px;
}
.hero h1 {
    font-size: 2.8em;
    font-weight: 800;
    letter-spacing: -1px;
    margin-bottom: 8px;
    color: var(--text-primary);
}
.hero .subtitle { color: var(--text-secondary); font-size: 1.05em; }
.hero .stats { color: var(--text-muted); font-size: 0.85em; margin-top: 6px; }

/* Search */
.search-bar {
    max-width: 520px;
    margin: 20px auto;
    position: relative;
}
.search-bar input {
    width: 100%;
    padding: 12px 16px 12px 44px;
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    background: var(--bg-secondary);
    color: var(--text-primary);
    font-size: 0.95em;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
}
.search-bar input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-dim); }
.search-bar .search-icon {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-muted);
    font-size: 1.1em;
}

/* Storage Bar */
.storage-section { margin: 20px 0 28px; }
.storage-section h3 { font-size: 0.9em; color: var(--text-secondary); margin-bottom: 10px; }
.storage-bar-container {
    display: flex;
    height: 24px;
    border-radius: var(--radius-sm);
    overflow: hidden;
    background: var(--bg-tertiary);
}
.storage-segment {
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.7em;
    font-weight: 600;
    color: #000;
    transition: opacity 0.2s;
}
.storage-segment:hover { opacity: 0.8; }
.storage-legend {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    margin-top: 10px;
}
.storage-legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 0.78em;
    color: var(--text-secondary);
}
.storage-dot {
    width: 10px;
    height: 10px;
    border-radius: 3px;
}

/* Cards Grid */
.cards-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 16px;
    margin: 20px 0;
}
.card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    cursor: pointer;
    transition: border-color 0.2s, transform 0.1s, box-shadow 0.2s;
    position: relative;
}
.card:hover {
    border-color: var(--border-hover);
    transform: translateY(-1px);
    box-shadow: 0 4px 20px rgba(77,166,255,0.06);
}
.card-icon {
    width: 40px;
    height: 40px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.3em;
    font-weight: 700;
    margin-bottom: 12px;
    color: #fff;
}
.card h3 { font-size: 1em; font-weight: 600; margin-bottom: 4px; }
.card .card-desc { font-size: 0.82em; color: var(--text-secondary); margin-bottom: 10px; }
.card .card-meta {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
}
.cat-btn {
    padding: 6px 14px;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    background: var(--bg-tertiary);
    color: var(--text-secondary);
    cursor: pointer;
    font-size: 0.8em;
    font-weight: 500;
    transition: all 0.2s;
}
.cat-btn:hover { border-color: var(--accent); color: var(--text-primary); }
.cat-btn.active { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); font-weight: 600; }
.badge { padding: 2px 8px; border-radius: 4px; font-size: 0.68em; font-weight: 600; margin-left: 6px; }
.badge-installed { background: #16a34a22; color: #22c55e; }
.badge-source { background: #eab30822; color: #eab308; }
.badge-missing { background: #64748b22; color: #64748b; }
.badge-hint { background: #6366f122; color: #a78bfa; }
.badge-other { background: #f59e0b22; color: #f59e0b; }
.badge-checking { background: #64748b11; color: #64748b; }
.attribution-bar { display: flex; gap: 16px; flex-wrap: wrap; padding: 10px 14px; background: var(--card-bg); border: 1px solid var(--border); border-radius: 8px; margin-bottom: 20px; font-size: 0.85em; }
.attribution-bar .attr-item { color: var(--text-secondary); }
.attribution-bar a { color: var(--accent); text-decoration: none; }
.attribution-bar a:hover { text-decoration: underline; }
.tag {
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 0.72em;
    font-weight: 500;
}
.tag-format { background: var(--purple-dim); color: var(--purple); }
.tag-tool { background: var(--accent-dim); color: var(--accent); }
.tag-count { background: var(--green-dim); color: var(--green); }
.top-badge {
    position: absolute;
    top: 12px;
    right: 12px;
    background: var(--badge-top);
    color: #fff;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 0.68em;
    font-weight: 700;
    letter-spacing: 0.5px;
}
.top-badge-inline {
    display: inline-flex;
    align-items: center;
    background: var(--badge-top);
    color: #fff;
    padding: 4px 12px;
    border-radius: 4px;
    font-size: 0.42em;
    font-weight: 700;
    letter-spacing: 0.5px;
    white-space: nowrap;
    flex-shrink: 0;
}

/* Category Section */
.category-section { margin-bottom: 28px; }
.category-title {
    font-size: 1.1em;
    font-weight: 600;
    color: var(--text-secondary);
    margin-bottom: 14px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
}

/* Detail Page */
.detail-header {
    display: flex;
    align-items: flex-start;
    gap: 20px;
    margin-bottom: 28px;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--border);
}
.detail-icon {
    width: 56px;
    height: 56px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.8em;
    font-weight: 700;
    color: #fff;
    flex-shrink: 0;
}
.detail-title-area h1 { font-size: 1.8em; font-weight: 700; margin-bottom: 4px; display: flex; align-items: center; gap: 14px; flex-wrap: wrap; }
.detail-title-area .detail-desc { color: var(--text-secondary); font-size: 0.95em; margin-bottom: 10px; }
.detail-badges {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
}
.platform-badge {
    padding: 3px 10px;
    border-radius: 4px;
    font-size: 0.75em;
    font-weight: 500;
    background: var(--green-dim);
    color: var(--green);
}
.platform-badge.unavailable {
    background: var(--bg-tertiary);
    color: var(--text-muted);
    text-decoration: line-through;
}

/* Detail Sections */
.detail-section { margin-bottom: 28px; }
.detail-section h2 {
    font-size: 1.15em;
    font-weight: 600;
    margin-bottom: 12px;
    color: var(--text-primary);
}
.detail-section h3 {
    font-size: 1em;
    font-weight: 600;
    margin-bottom: 8px;
    color: var(--text-secondary);
}
.detail-section ul {
    list-style: none;
    padding: 0;
}
.detail-section ul li {
    padding: 4px 0 4px 18px;
    position: relative;
    font-size: 0.9em;
    color: var(--text-secondary);
}
.detail-section ul li::before {
    content: '';
    position: absolute;
    left: 0;
    top: 12px;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--accent);
}
.detail-section p {
    font-size: 0.92em;
    color: var(--text-secondary);
    line-height: 1.7;
}

/* Code Blocks */
.code-block {
    background: var(--bg-tertiary);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 12px 16px;
    font-family: var(--mono);
    font-size: 0.83em;
    color: var(--green);
    overflow-x: auto;
    cursor: pointer;
    transition: border-color 0.2s;
    margin-bottom: 8px;
    position: relative;
    word-break: break-all;
    white-space: pre-wrap;
}
.code-block:hover { border-color: var(--accent); }
.code-block .copy-hint {
    position: absolute;
    top: 6px;
    right: 10px;
    font-size: 0.75em;
    color: var(--text-muted);
    font-family: inherit;
}
.code-label {
    font-size: 0.78em;
    color: var(--text-muted);
    margin: -4px 0 12px;
}

/* Tables */
.detail-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.85em;
    margin-bottom: 16px;
}
.detail-table th {
    text-align: left;
    padding: 8px 12px;
    background: var(--bg-tertiary);
    color: var(--text-secondary);
    font-weight: 600;
    border-bottom: 1px solid var(--border);
}
.detail-table td {
    padding: 8px 12px;
    border-bottom: 1px solid var(--border);
    color: var(--text-secondary);
}
.detail-table tr:hover td { background: var(--bg-card-hover); }
.detail-table .mono { font-family: var(--mono); font-size: 0.92em; color: var(--accent); }
.detail-table .highlight { color: var(--purple); font-weight: 600; }

/* Variant table (model detail) */
.variant-table { width: 100%; border-collapse: collapse; font-size: 0.85em; }
.variant-table th {
    text-align: left;
    padding: 10px 12px;
    background: var(--bg-tertiary);
    color: var(--text-secondary);
    font-weight: 600;
    border-bottom: 1px solid var(--border);
}
.variant-table td {
    padding: 10px 12px;
    border-bottom: 1px solid var(--border);
    color: var(--text-secondary);
}
.variant-table tr:hover td { background: var(--bg-card-hover); }
.variant-cmd-cell {
    font-family: var(--mono);
    font-size: 0.85em;
    color: var(--green);
    cursor: pointer;
    max-width: 400px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
}
.variant-cmd-cell:hover { color: var(--accent); }

/* Quick Start Cards */
.quickstart-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
    gap: 16px;
    margin: 20px 0;
}
.qs-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    transition: border-color 0.2s;
}
.qs-card:hover { border-color: var(--border-hover); }
.qs-card h4 { font-size: 1em; margin-bottom: 6px; color: var(--text-primary); }
.qs-card p { font-size: 0.82em; color: var(--text-secondary); margin-bottom: 12px; }
.qs-card .cmd {
    background: var(--bg-tertiary);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 10px 14px;
    font-family: var(--mono);
    font-size: 0.8em;
    color: var(--green);
    cursor: pointer;
    overflow-x: auto;
    white-space: pre-wrap;
    word-break: break-all;
    transition: border-color 0.2s;
}
.qs-card .cmd:hover { border-color: var(--accent); }

/* Related links */
.related-links {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    margin-top: 12px;
}
.related-link {
    padding: 6px 14px;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text-secondary);
    text-decoration: none;
    font-size: 0.82em;
    transition: all 0.2s;
    cursor: pointer;
}
.related-link:hover { border-color: var(--accent); color: var(--accent); }

/* Testimonials */
.testimonials-section { margin-top: 8px; }
.testimonial-card {
    background: var(--bg-tertiary);
    border: 1px solid var(--border);
    border-left: 3px solid var(--accent);
    border-radius: var(--radius-sm);
    padding: 14px 18px;
    margin-bottom: 12px;
    font-size: 0.85em;
}
.testimonial-card .quote {
    color: var(--text-primary);
    font-style: italic;
    line-height: 1.5;
    margin-bottom: 8px;
}
.testimonial-card .source {
    color: var(--text-muted);
    font-size: 0.88em;
    display: flex;
    justify-content: space-between;
    align-items: center;
}
.testimonial-card .source .date { color: var(--yellow); font-weight: 500; }
.testimonial-card .source a {
    color: var(--accent);
    text-decoration: none;
    font-size: 0.9em;
}
.testimonial-card .source a:hover { text-decoration: underline; }

/* Model Paths */
.paths-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 12px;
    margin-top: 12px;
}
.path-card {
    background: var(--bg-tertiary);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 14px;
}
.path-card h4 {
    font-size: 0.88em;
    color: var(--accent);
    margin-bottom: 6px;
}
.path-card code {
    font-family: var(--mono);
    font-size: 0.82em;
    color: var(--green);
    background: var(--bg-card);
    padding: 2px 6px;
    border-radius: 3px;
}
.path-card p {
    font-size: 0.8em;
    color: var(--text-secondary);
    margin-top: 4px;
}
.download-btn {
    display: inline-block;
    padding: 8px 16px;
    background: var(--accent);
    color: #fff;
    border-radius: var(--radius-sm);
    text-decoration: none;
    font-size: 0.85em;
    font-weight: 600;
    margin: 8px 0;
    transition: opacity 0.2s;
}
.download-btn:hover { opacity: 0.85; }
.download-btn-sm {
    display: inline-block;
    padding: 4px 10px;
    background: var(--accent-dim);
    color: var(--accent);
    border-radius: 4px;
    text-decoration: none;
    font-size: 0.75em;
    font-weight: 600;
    transition: background 0.2s;
}
.download-btn-sm:hover { background: var(--accent); color: #fff; }
.dl-available::before { content: '\2713 '; }
.dl-missing { opacity: 0.5; border: 1px dashed var(--text-muted) !important; }
.dl-missing::before { content: '\2717 '; }
.dl-missing-msg {
    margin-top: 8px;
    padding: 8px 12px;
    background: var(--yellow-dim);
    border-left: 3px solid var(--yellow);
    border-radius: 4px;
    font-size: 0.78em;
    color: var(--text-secondary);
    animation: fadeIn 0.2s;
}
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

/* Toast */
.copied-toast {
    position: fixed;
    bottom: 30px;
    right: 30px;
    background: var(--green);
    color: #000;
    padding: 10px 20px;
    border-radius: var(--radius);
    font-weight: 600;
    font-size: 0.85em;
    opacity: 0;
    transform: translateY(10px);
    transition: all 0.3s;
    pointer-events: none;
    z-index: 1000;
}
.copied-toast.show { opacity: 1; transform: translateY(0); }

/* Footer */
.site-footer {
    padding: 36px 20px;
    color: var(--text-muted);
    font-size: 0.8em;
    border-top: 1px solid var(--border);
    margin-top: 40px;
}
.footer-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 24px;
    max-width: 1200px;
    margin: 0 auto 24px auto;
}
.footer-col h4 { color: var(--text-secondary); font-size: 1em; margin-bottom: 8px; font-weight: 600; }
.footer-col a { display: block; color: var(--text-muted); text-decoration: none; padding: 2px 0; font-size: 0.95em; }
.footer-col a:hover { color: var(--accent); }
.footer-note { text-align: center; margin-top: 16px; padding-top: 16px; border-top: 1px solid var(--border); }

/* Responsive */
@media (max-width: 900px) {
    .top-nav { padding: 0 12px; gap: 12px; }
}
@media (max-width: 768px) {
    body { padding-top: 56px; }
    .top-nav { height: 56px; }
    .container { padding: 12px; }
    .hero h1 { font-size: 2em; }
    .cards-grid { grid-template-columns: 1fr; }
    .quickstart-grid { grid-template-columns: 1fr; }
    .nav-links { gap: 2px; padding: 2px; }
    .nav-link { padding: 5px 10px; font-size: 0.78em; }
    .detail-header { flex-direction: column; gap: 12px; }
    .detail-table { font-size: 0.78em; }
    .detail-table th, .detail-table td { padding: 6px 8px; }
}
@media (max-width: 480px) {
    .nav-links { display: none; }
}

a.card, a.nav-logo, a.nav-link, a.related-link {
    text-decoration: none;
    color: inherit;
}
</style>
</head>
<body>

<div id="app-root"></div>
<div class="copied-toast" id="copiedToast">Copied to clipboard!</div>

<script>
// =============================================================================
// PLATFORM CONFIGURATION (4 platforms)
// =============================================================================
const PLATFORMS = {
    jetson: {
        id: 'jetson', label: 'Jetson', fullLabel: 'Jetson (Linux ARM64)',
        toolsBase: './tools/linux-arm64', modelsBase: './models',
        llamaBin: 'llama-server', whisperBin: 'whisper-cli',
        piperBin: 'piper/piper', sdBin: 'sd-cli', sep: '/',
        gpu: 'CUDA SM 8.7', gpuFlag: '-ngl 999',
        arch: 'linux-arm64', prebuilt: ['piper','onnxruntime','ffmpeg','vosk'],
        buildFromSource: ['llama.cpp','whisper.cpp','sd.cpp']
    },
    ubuntu: {
        id: 'ubuntu', label: 'Ubuntu', fullLabel: 'Ubuntu (x86_64)',
        toolsBase: './tools/linux-x86_64', modelsBase: './models',
        llamaBin: 'llama-server', whisperBin: 'whisper-cli',
        piperBin: 'piper/piper', sdBin: 'sd-cli', sep: '/',
        gpu: 'CUDA (optional)', gpuFlag: '-ngl 999',
        arch: 'linux-x86_64', prebuilt: ['piper','onnxruntime','ffmpeg','vosk'],
        buildFromSource: ['llama.cpp','whisper.cpp','sd.cpp']
    },
    mac: {
        id: 'mac', label: 'macOS', fullLabel: 'macOS (Apple Silicon)',
        toolsBase: './tools/macos-arm64', modelsBase: './models',
        llamaBin: 'llama-server', whisperBin: 'whisper-cli',
        piperBin: 'piper/piper', sdBin: 'sd-cli', sep: '/',
        gpu: 'Metal', gpuFlag: '-ngl 999',
        arch: 'macos-arm64', prebuilt: ['llama.cpp','piper','sd.cpp','onnxruntime','ffmpeg'],
        buildFromSource: ['whisper.cpp']
    },

// Installation status for current instance (Jetson ARM64)
// Dynamic install status - checked against server on page load
const INSTALLED_TOOLS = {};

// Check tool availability by probing binary paths on the server
async function checkInstalledTools() {
    const currentPlat = currentPlatform;

    const checks = TOOLS.map(async (t) => {
        if (!t.downloads) {
            INSTALLED_TOOLS[t.id] = 'missing';
            return;
        }
        const bins = t.downloads.binaries || {};
        const hasBinaries = Object.keys(bins).length > 0;

        // If no binaries defined, use installHint as the status
        if (!hasBinaries) {
            INSTALLED_TOOLS[t.id] = t.downloads.installHint || 'missing';
            return;
        }

        // Check all binary paths — tool is "in the ark" if ANY platform binary exists
        const allPaths = Object.values(bins).filter(p => p);
        if (allPaths.length === 0) {
            INSTALLED_TOOLS[t.id] = t.downloads.installHint || 'missing';
            return;
        }
        // Try current platform first, then any other
        const binPath = bins[currentPlat];
        const pathsToTry = binPath ? [binPath, ...allPaths.filter(p => p !== binPath)] : allPaths;
        let found = false;
        for (const p of pathsToTry) {
            try {
                const r = await fetch(p, {method:'HEAD'});
                if (r.ok) { found = true; break; }
            } catch(e) {}
        }
        INSTALLED_TOOLS[t.id] = found ? 'installed' : 'missing';
    });

    // Also check source repos
    const sourceChecks = [
        {id:'llama-cpp', path:'sources/llama.cpp/CMakeLists.txt'},
        {id:'whisper-cpp', path:'sources/whisper.cpp/CMakeLists.txt'},
        {id:'sd-cpp', path:'sources/stable-diffusion.cpp/CMakeLists.txt'},
        {id:'bitnet', path:'sources/BitNet/run_inference.py'}
    ].map(async (s) => {
        try {
            const r = await fetch(s.path, {method:'HEAD'});
            if (r.ok && INSTALLED_TOOLS[s.id] !== 'installed') {
                INSTALLED_TOOLS[s.id] = 'source';
            }
        } catch(e) {}
    });

    await Promise.all([...checks, ...sourceChecks]);
    // Re-render to update badges
    router();
}

function getInstallBadge(toolId) {
    const status = INSTALLED_TOOLS[toolId] || 'checking';
    switch(status) {
        case 'installed': return '<span class="badge badge-installed">Installed</span>';
        case 'system': return '<span class="badge badge-installed">System</span>';
        case 'source': return '<span class="badge badge-source">Source Only</span>';
        case 'bundled': return '<span class="badge badge-installed">Bundled</span>';
        case 'npm': return '<span class="badge badge-hint">npm install</span>';
        case 'pip': return '<span class="badge badge-hint">pip install</span>';
        case 'docker': return '<span class="badge badge-hint">Docker</span>';
        case 'package': return '<span class="badge badge-hint">System Package</span>';
        case 'python': return '<span class="badge badge-hint">Python</span>';
        case 'checking': return '<span class="badge badge-checking">Checking...</span>';
        default: return '<span class="badge badge-missing">Not Installed</span>';
    }
}

// UTILITY FUNCTIONS
// =============================================================================
function esc(str) {
    if (!str) return '';
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
}

function copyText(el) {
    let text = el.textContent || el.innerText;
    text = text.replace(/click to copy/gi, '').replace(/\bcopy\b/gi, '').trim();
    navigator.clipboard.writeText(text).then(showToast).catch(() => {
        const ta = document.createElement('textarea');
        ta.value = text;
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
        showToast();
    });
}

function showToast() {
    const toast = document.getElementById('copiedToast');
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 1500);
}

function navigate(hash) {
    window.location.hash = hash;
}

// Download link handler - checks file exists before downloading
function handleDownload(event, path) {
    event.preventDefault();
    event.stopPropagation();
    const el = event.currentTarget;
    el.style.opacity = '0.5';
    fetch(path, {method: 'HEAD'}).then(r => {
        el.style.opacity = '1';
        if (r.ok) {
            const a = document.createElement('a');
            a.href = path;
            a.download = path.split('/').pop();
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        } else {
            showDownloadError(path, el);
        }
    }).catch(() => {
        el.style.opacity = '1';
        showDownloadError(path, el);
    });
}

function showDownloadError(path, el) {
    // Show inline error message
    let msg = el.closest('.detail-section, .qs-card, .card, .path-card');
    if (!msg) msg = el.parentElement;
    let existing = msg.querySelector('.dl-missing-msg');
    if (!existing) {
        existing = document.createElement('div');
        existing.className = 'dl-missing-msg';
        existing.innerHTML = `<strong>File not yet available:</strong> <code>${esc(path)}</code><br>Run <code>./update.sh</code> (tools) or <code>./download-all-models.sh</code> (models) to populate downloads.`;
        msg.appendChild(existing);
        setTimeout(() => existing.remove(), 8000);
    }
}

// Check download availability after page render
function checkDownloads() {
    document.querySelectorAll('a[download]').forEach(a => {
        const href = a.getAttribute('href');
        if (!href || href.startsWith('#')) return;
        fetch(href, {method: 'HEAD'}).then(r => {
            if (r.ok) {
                a.classList.add('dl-available');
                a.classList.remove('dl-missing');
            } else {
                a.classList.add('dl-missing');
                a.classList.remove('dl-available');
            }
        }).catch(() => {
            a.classList.add('dl-missing');
        });
    });
}

function getCommand(variant, family) {
    const p = PLATFORMS[currentPlatform];
    const s = p.sep;
    const modelPath = currentPlatform === 'windows' ? variant.file.replace(/\//g, '\\') : variant.file;
    const tool = family.tool;

    if (tool === 'llama.cpp') {
        if (family.category === 'Vision') {
            return `${p.toolsBase}${s}${p.llamaBin} -m ${p.modelsBase}${s}${modelPath} ${p.gpuFlag} --mmproj mmproj.gguf -c 4096 --port 8080`;
        }
        return `${p.toolsBase}${s}${p.llamaBin} -m ${p.modelsBase}${s}${modelPath} ${p.gpuFlag} -c 4096 --port 8080`;
    }
    if (tool === 'whisper.cpp') {
        return `${p.toolsBase}${s}${p.whisperBin} -m ${p.modelsBase}${s}${modelPath} -f audio.wav`;
    }
    if (tool === 'piper') {
        return `echo "Hello world" | ${p.toolsBase}${s}${p.piperBin} --model ${p.modelsBase}${s}${modelPath} --output_file out.wav`;
    }
    if (tool === 'sd.cpp') {
        return `${p.toolsBase}${s}${p.sdBin} -m ${p.modelsBase}${s}${modelPath} -p "a photo of a cat" -o output.png`;
    }
    if (tool === 'onnxruntime') {
        if (family.category === 'TTS') {
            return `python3 kokoro_tts.py --model ${p.modelsBase}${s}${modelPath} --text "Hello world" --output out.wav`;
        }
        if (family.category === 'STT') {
            return `python3 moonshine_transcribe.py --model ${p.modelsBase}${s}${modelPath} --audio recording.wav`;
        }
        return `python3 run_onnx.py --model ${p.modelsBase}${s}${modelPath}`;
    }
    if (tool === 'vosk') {
        return `python3 vosk_transcribe.py --model-path ${p.modelsBase}${s}${modelPath} --input audio.wav`;
    }
    if (tool === 'python') {
        if (family.slug === 'coqui-xtts') {
            return `python3 -m TTS --model_path ${p.modelsBase}${s}${modelPath} --text "Hello world" --speaker_wav speaker.wav --out_path output.wav`;
        }
        if (family.slug === 'other-tts') {
            return `python3 tts_generate.py --model ${p.modelsBase}${s}${modelPath} --text "Hello world" --output output.wav`;
        }
        return `python3 run_model.py --model ${p.modelsBase}${s}${modelPath}`;
    }
    if (tool === 'nemo/python') {
        if (family.category === 'STT' || variant.name.includes('Canary') || variant.name.includes('Parakeet')) {
            return `python3 nemo_asr.py --model ${p.modelsBase}${s}${modelPath} --audio recording.wav`;
        }
        return `python3 nemo_inference.py --model ${p.modelsBase}${s}${modelPath}`;
    }
    return `# Run: see ${tool} documentation for usage`;
}

// =============================================================================
// ROUTER
// =============================================================================
function getRoute() {
    const hash = window.location.hash || '#/';
    return hash.replace(/^#/, '') || '/';
}

function router() {
    const route = getRoute();
    const app = document.getElementById('app-root');

    let html = renderNav(route);

    if (route === '/') {
        html += renderHome();
    } else if (route === '/tools') {
        html += renderToolsList();
    } else if (route === '/tools/ollama') {
        html += renderOllama();
    } else if (route.startsWith('/tools/')) {
        const toolId = route.replace('/tools/', '');
        html += renderToolDetail(toolId);
    } else if (route === '/models') {
        html += renderModelsList();
    } else if (route.startsWith('/models/')) {
        const slug = route.replace('/models/', '');
        html += renderModelDetail(slug);
    } else if (route === '/quickstart') {
        html += renderQuickStart();
    } else {
        html += renderHome();
    }

    html += renderFooter();
    app.innerHTML = html;

    // Rebind search if present
    const searchInput = document.getElementById('searchInput');
    if (searchInput) {
        searchInput.addEventListener('input', () => {
            const term = searchInput.value.toLowerCase();
            filterCards(term);
        });
    }

    // Check download link availability after render
    setTimeout(checkDownloads, 100);
}

// =============================================================================

function renderNav(route) {
    const activeSection = route === '/' ? 'home' :
        route.startsWith('/tools') ? 'tools' :
        route.startsWith('/models') ? 'models' :
        route.startsWith('/quickstart') ? 'quickstart' : 'home';

    return `
    <nav class="top-nav">
        <a href="#/" class="nav-logo">Val Ark</a>
        <div class="nav-links">
            <a href="#/" class="nav-link ${activeSection === 'home' ? 'active' : ''}">Home</a>
            <a href="#/tools" class="nav-link ${activeSection === 'tools' ? 'active' : ''}">Software</a>
            <a href="#/models" class="nav-link ${activeSection === 'models' ? 'active' : ''}">Models</a>
            <a href="#/quickstart" class="nav-link ${activeSection === 'quickstart' ? 'active' : ''}">Getting Started</a>
        </div>
    </nav>`;
}

function renderBreadcrumb(parts) {
    let html = '<div class="breadcrumb"><a href="#/">Home</a>';
    for (let i = 0; i < parts.length; i++) {
        html += '<span class="sep">/</span>';
        if (i < parts.length - 1) {
            html += `<a href="${parts[i].href}">${esc(parts[i].label)}</a>`;
        } else {
            html += `<span class="current">${esc(parts[i].label)}</span>`;
        }
    }
    html += '</div>';
    return html;
}

        <p class="stats">${totalModels}+ Models | ${TOOLS.length} Tools | ${Object.keys(PLATFORMS).length} Platforms | ~${totalStorage} GB</p>

        <span class="search-icon">&#x1F50D;</span>
        <input type="text" id="searchInput" placeholder="Search models, tools, formats...">
    </div>`;

    // Storage bar
    html += `<div class="storage-section"><h3>Storage Breakdown (~${totalStorage} GB total)</h3>`;
    html += '<div class="storage-bar-container">';
    STORAGE_DATA.forEach(d => {
        const pct = (d.size / totalStorage * 100).toFixed(1);

        html += `<div class="storage-legend-item"><div class="storage-dot" style="background:${d.color}"></div>${d.label} (~${d.size}GB)</div>`;
    });
    html += '</div></div>';

    // Tools section grouped by category
    const toolCatOrder = ['ai-inference', 'ai-platform', 'creative', 'media', 'infrastructure', 'dev-tools'];
    toolCatOrder.forEach(catId => {
        const cat = TOOL_CATEGORIES[catId];
        const catTools = TOOLS.filter(t => t.category === catId);
        if (catTools.length === 0) return;
        html += `<div class="category-section"><div class="category-title">${cat.label}</div>`;
        html += '<div class="cards-grid" id="toolCards-' + catId + '">';
        catTools.forEach(t => {
            const cardIcon = t.logo
                ? `<img src="${t.logo}" alt="${esc(t.name)}" style="width:40px;height:40px;border-radius:8px;object-fit:cover" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"><div class="card-icon" style="background:${t.iconBg};display:none">${t.icon}</div>`
                : `<div class="card-icon" style="background:${t.iconBg}">${t.icon}</div>`;
            const sizeTag = t.size ? `<span class="tag" style="background:var(--purple-dim);color:var(--purple);font-size:0.7em">${t.size}</span>` : '';
            html += `
            <a href="#/tools/${t.id}" class="card" data-search="${esc(t.name + ' ' + t.desc + ' ' + t.id + ' ' + catId)}">
                ${cardIcon}
                <h3>${esc(t.name)}</h3>
                <div class="card-desc">${esc(t.desc)}</div>
                <div class="card-meta">
                    ${sizeTag}
                    ${getInstallBadge(t.id)}
                </div>
            </a>`;
        });
        html += '</div></div>';
    });

    // Models section grouped by category
    const categories = ['LLM', 'TTS', 'STT', 'Vision', 'ImageGen', 'NVIDIA'];
    const categoryLabels = {LLM:'Large Language Models', TTS:'Text-to-Speech', STT:'Speech-to-Text', Vision:'Vision Language Models', ImageGen:'Image Generation', NVIDIA:'NVIDIA Specialized'};

    categories.forEach(cat => {
        const families = MODEL_FAMILIES.filter(f => f.category === cat);
        if (families.length === 0) return;
        html += `<div class="category-section"><div class="category-title">${categoryLabels[cat]}</div>`;
        html += '<div class="cards-grid" id="modelCards-' + cat + '">';
        families.forEach(f => {
            const hasTopPick = f.topPick || f.variants.some(v => v.topPick);
            const logoImg = f.logo ? `<img src="${f.logo}" alt="" style="width:28px;height:28px;border-radius:6px;object-fit:cover;margin-right:8px;vertical-align:middle" onerror="this.style.display='none'">` : '';

            html += `
            <a href="#/models/${f.slug}" class="card" data-search="${esc(f.family + ' ' + f.desc + ' ' + f.format + ' ' + f.tool + ' ' + f.variants.map(v=>v.name+' '+v.note).join(' '))}">

                </div>

        });
        html += '</div></div>';
    });

    html += '</div>';
    return html;
}

function filterCards(term) {
    document.querySelectorAll('.card').forEach(card => {
        const searchData = (card.getAttribute('data-search') || '').toLowerCase();
        card.style.display = (!term || searchData.includes(term)) ? '' : 'none';
    });
}

let activeToolCategory = 'all';

        const count = TOOLS.filter(t => t.category === catId).length;
        if (count > 0) {

            html += `<div class="path-card"><h4>${os === 'linux' ? 'Linux' : os === 'macos' ? 'macOS' : 'Windows'}</h4><code>${esc(path)}</code></div>`;
        });
        html += '</div>';
        if (pathInfo.env) html += `<p style="color:var(--text-muted);font-size:0.8em;margin-top:8px">${esc(pathInfo.env)}</p>`;
        html += '</div>';
    }

    // Testimonials
    const toolTestimonials = TESTIMONIALS[toolId];
    if (toolTestimonials && toolTestimonials.length) {
        html += '<div class="detail-section"><h2>What People Are Saying</h2><div class="testimonials-section">';
        toolTestimonials.forEach(t => {
            html += `<div class="testimonial-card">
                <div class="quote">"${esc(t.quote)}"</div>
                <div class="source">
                    <span>${esc(t.source)}</span>
                    <span class="date">${esc(t.date)}</span>
                </div>
            </div>`;
        });
        html += '</div></div>';
    }

    // Related models
    const relatedModels = MODEL_FAMILIES.filter(f => f.tool === tool.name || f.tool === toolId.replace('-', '.'));
    if (relatedModels.length) {
        html += '<div class="detail-section"><h2>Models Using This Tool</h2><div class="related-links">';
        relatedModels.forEach(f => {
            html += `<a href="#/models/${f.slug}" class="related-link">${esc(f.family)}</a>`;
        });
        html += '</div></div>';
    }

    html += '</div>';
    return html;
}

function renderModelsList() {
    const categories = ['LLM', 'TTS', 'STT', 'Vision', 'ImageGen', 'NVIDIA'];

    let html = '<div class="container">';

    html += `<div class="search-bar">
        <span class="search-icon">&#x1F50D;</span>
        <input type="text" id="searchInput" placeholder="Search model families...">
    </div>`;

    categories.forEach(cat => {
        const families = MODEL_FAMILIES.filter(f => f.category === cat);
        if (families.length === 0) return;
        html += `<div class="category-section"><div class="category-title">${categoryLabels[cat]}</div>`;
        html += '<div class="cards-grid">';

            html += `
            <a href="#/models/${f.slug}" class="card" data-search="${esc(f.family + ' ' + f.desc + ' ' + f.format + ' ' + f.tool + ' ' + f.variants.map(v=>v.name+' '+(v.note||'')).join(' '))}">
                ${hasTopPick ? '<span class="top-badge">TOP PICK</span>' : ''}
                <h3>${logoImg}${esc(f.family)}</h3>
                <div class="card-desc">${esc(f.desc)}</div>
                <div class="card-meta">
                    <span class="tag tag-format">${esc(f.format)}</span>
                    <span class="tag tag-tool">${esc(f.tool)}</span>
                    <span class="tag tag-count">${f.variants.length} variant${f.variants.length > 1 ? 's' : ''}</span>
                </div>
                <div class="card-meta" style="margin-top:4px">
                    <span class="tag" style="background:var(--accent-dim);color:var(--accent)">${esc(topVariant.name)} - ${esc(topVariant.size)}</span>

        html += '</div></div>';
    });

    html += '</div>';
    return html;
}

// MODEL DETAIL
// =============================================================================
function renderModelDetail(slug) {
    const family = MODEL_FAMILIES.find(f => f.slug === slug);
    if (!family) return '<div class="container"><h1>Model family not found</h1></div>';

    const hasTopPick = family.topPick || family.variants.some(v => v.topPick);
    const toolObj = TOOLS.find(t => t.id === family.tool.replace('.', '-').replace('/', '-')) ||
                    TOOLS.find(t => t.name === family.tool) ||
                    TOOLS.find(t => family.tool.includes(t.id.replace('-', '.')));

    let html = '<div class="container">';
    html += renderBreadcrumb([{label: 'Models', href: '#/models'}, {label: family.family}]);

    // Header
    const familyLogo = family.logo
        ? `<img src="${family.logo}" alt="${esc(family.family)}" style="width:56px;height:56px;border-radius:12px;object-fit:cover" onerror="this.style.display='none'">`
        : '';
    html += `<div class="detail-header">
        ${familyLogo}
        <div class="detail-title-area">
            <h1>${esc(family.family)}${hasTopPick ? ' <span class="top-badge-inline">TOP PICK</span>' : ''}</h1>
            <div class="detail-desc">${esc(family.desc)}</div>
            <div class="detail-badges">
                <span class="tag tag-format" style="font-size:0.85em;padding:4px 12px">${esc(family.format)}</span>
                <span class="tag tag-tool" style="font-size:0.85em;padding:4px 12px">${esc(family.tool)}</span>
                <span class="tag tag-count" style="font-size:0.85em;padding:4px 12px">${family.variants.length} variant${family.variants.length > 1 ? 's' : ''}</span>
            </div>
        </div>
    </div>`;

    // Attribution / License
    const modelMeta = MODEL_META[family.slug];
    if (modelMeta) {
        html += `<div class="attribution-bar">`;
        html += `<span class="attr-item">By <a href="${modelMeta.website}" target="_blank" rel="noopener">${esc(modelMeta.maker)}</a></span>`;
        html += `<span class="attr-item">License: ${esc(modelMeta.license)}</span>`;
        html += `</div>`;
    }

    // Quick download box
    const recVariant = family.variants.find(v => v.topPick) || family.variants[0];
    const recPath = 'models/' + recVariant.file;
    const recFilename = recVariant.file.split('/').pop();
    html += `<div class="detail-section" style="background:var(--bg-tertiary);padding:16px 20px;border-radius:var(--radius);border:1px solid var(--border)">
        <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px">
            <div>
                <h3 style="font-size:1em;margin-bottom:4px">Recommended: ${esc(recVariant.name)} (${esc(recVariant.quant)}) - ${esc(recVariant.size)}</h3>
                <p style="font-size:0.82em;color:var(--text-muted)">${esc(recVariant.note || 'Best balance of speed and quality')}</p>
            </div>
            <a href="${recPath}" download class="download-btn" onclick="handleDownload(event,'${recPath}')">&#x2B07; Download ${esc(recFilename)}</a>
        </div>
        ${family.variants.length > 1 ? `<p style="font-size:0.78em;color:var(--text-muted);margin-top:8px">${family.variants.length} variants available below - scroll to Variants table for all downloads</p>` : ''}
    </div>`;

    // Overview
    if (family.overview) {
        html += `<div class="detail-section"><h2>Overview</h2><p>${esc(family.overview)}</p></div>`;
    }

    // Usage tips
    if (family.usageTips && family.usageTips.length) {
        html += '<div class="detail-section"><h2>Usage Tips</h2><ul>';
        family.usageTips.forEach(tip => { html += `<li>${esc(tip)}</li>`; });
        html += '</ul></div>';
    }

    // Variants table
    html += '<div class="detail-section"><h2>Variants</h2>';
    html += '<table class="variant-table"><thead><tr><th>Name</th><th>Quant</th><th>Size</th><th>Download</th><th>Notes</th><th>Run Command</th></tr></thead><tbody>';
    family.variants.forEach(v => {
        const cmd = getCommand(v, family);
        const dlPath = 'models/' + v.file;
        const filename = v.file.split('/').pop();
        html += `<tr>
            <td style="font-weight:600;color:var(--text-primary)">${esc(v.name)} ${v.topPick ? '<span style="color:var(--badge-top);font-size:0.75em;font-weight:700">TOP</span>' : ''}</td>
            <td class="highlight">${esc(v.quant)}</td>
            <td>${esc(v.size)}</td>
            <td><a href="${dlPath}" download class="download-btn-sm" onclick="handleDownload(event,'${dlPath}')">${esc(filename)}</a></td>
            <td>${esc(v.note || '')}</td>
            <td class="variant-cmd-cell" onclick="event.stopPropagation();copyText(this)" title="Click to copy">${esc(cmd)}</td>
        </tr>`;
    });
    html += '</tbody></table></div>';

    // Platform commands section
    html += '<div class="detail-section"><h2>Platform-Specific Commands</h2>';
    html += `<p style="margin-bottom:12px;font-size:0.85em">Commands shown for: <strong>${PLATFORMS[currentPlatform].fullLabel}</strong> (select a different platform on the <a href="#/quickstart" style="color:var(--accent)">Getting Started</a> page)</p>`;
    family.variants.forEach(v => {
        const cmd = getCommand(v, family);
        html += `<div class="code-block" onclick="copyText(this)"><span class="copy-hint">copy</span>${esc(cmd)}</div>`;
        html += `<div class="code-label">${esc(v.name)}${v.quant && v.quant !== '-' ? ' (' + v.quant + ')' : ''} - ${esc(v.size)}</div>`;
    });
    html += '</div>';

    // Powered by
    if (toolObj) {
        html += `<div class="detail-section"><h2>Powered By</h2>
            <div class="related-links">
                <a href="#/tools/${toolObj.id}" class="related-link">${esc(toolObj.name)} - ${esc(toolObj.desc)}</a>
            </div>
        </div>`;
    }

    // Testimonials for model family
    const modelTestimonials = MODEL_TESTIMONIALS[slug];
    if (modelTestimonials && modelTestimonials.length) {
        html += '<div class="detail-section"><h2>What People Are Saying</h2><div class="testimonials-section">';
        modelTestimonials.forEach(t => {
            html += `<div class="testimonial-card">
                <div class="quote">"${esc(t.quote)}"</div>
                <div class="source">
                    <span>${esc(t.source)}</span>
                    <span class="date">${esc(t.date)}</span>
                </div>
            </div>`;
        });
        html += '</div></div>';
    }

    // Related models (same category)
    const related = MODEL_FAMILIES.filter(f => f.category === family.category && f.slug !== slug);
    if (related.length) {
        html += '<div class="detail-section"><h2>Related Families</h2><div class="related-links">';
        related.forEach(f => {
            html += `<a href="#/models/${f.slug}" class="related-link">${esc(f.family)}</a>`;
        });
        html += '</div></div>';
    }

    html += '</div>';
    return html;
}

    // Guide 4: Image Generation
    html += `<div class="detail-section">
        <h3>Guide: Generating Images from Text</h3>
        <div style="margin:12px 0;padding:12px;background:var(--bg-tertiary);border-radius:6px">

            <ul style="font-size:0.85em;color:var(--text-secondary);padding-left:20px">
                <li>stable-diffusion.cpp built/installed (see <a href="#/tools/sd-cpp" style="color:var(--accent)">sd.cpp tool page</a>)</li>
                <li>Model: SDXL-Turbo safetensors (~6.5 GB) or SD 1.5 (~2 GB for Q8)</li>
                <li>At least 8 GB VRAM (or 16 GB RAM for CPU inference)</li>
            </ul>
        </div>
        <p style="font-size:0.9em;margin:12px 0"><strong>Step 1:</strong> Quick generation with SDXL Turbo (1 step)</p>
        <div class="cmd" onclick="copyText(this)">${esc(p.toolsBase + s + p.sdBin)} -m ${esc(p.modelsBase + s)}image${s}sdxl-turbo${s}sdxl_turbo.safetensors -p "a mountain landscape at sunset, photorealistic" --steps 1 -o mountain.png</div>
        <p style="font-size:0.9em;margin:12px 0"><strong>Step 2:</strong> Higher quality with more steps</p>
        <div class="cmd" onclick="copyText(this)">${esc(p.toolsBase + s + p.sdBin)} -m ${esc(p.modelsBase + s)}image${s}sdxl-turbo${s}sdxl_turbo.safetensors -p "cyberpunk city, neon lights, rain" --steps 4 --cfg-scale 1.0 -W 1024 -H 1024 -o cyber.png</div>
        <p style="font-size:0.9em;margin:12px 0"><strong>Step 3:</strong> Using a negative prompt</p>
        <div class="cmd" onclick="copyText(this)">${esc(p.toolsBase + s + p.sdBin)} -m ${esc(p.modelsBase + s)}image${s}sdxl-turbo${s}sdxl_turbo.safetensors -p "portrait of a person, professional photo" -n "blurry, low quality, distorted" --steps 4 -o portrait.png</div>
        <div style="margin-top:12px;padding:10px;background:var(--green-dim);border-left:3px solid var(--green);border-radius:4px">
            <p style="font-size:0.85em"><strong>Expected output:</strong> PNG image at specified resolution. SDXL Turbo generates in 1-4 steps (2-10 seconds on GPU).
            Standard SDXL needs 20-30 steps for best quality. Output is saved to the specified -o path.</p>
        </div>
        <div style="margin-top:8px;padding:10px;background:var(--yellow-dim);border-left:3px solid var(--yellow);border-radius:4px">
            <p style="font-size:0.85em"><strong>Tips:</strong> Use <code>--seed 42</code> for reproducible results. Add <code>--lora path/to/lora.safetensors</code>

    // Guide 5: RAG (Retrieval Augmented Generation) Pipeline

                <li>llama.cpp with embedding support (llama-embedding binary)</li>
                <li>An LLM model (e.g., Qwen2.5-7B-Instruct-Q4_K_M.gguf)</li>
                <li>Python 3.8+ with numpy</li>
            </ul>
        </div>
        <p style="font-size:0.9em;margin:12px 0"><strong>Step 1:</strong> Start embedding server</p>
        <div class="cmd" onclick="copyText(this)">${esc(p.toolsBase + s + p.llamaBin)} -m ${esc(p.modelsBase + s)}llm${s}qwen2.5-7b${s}Qwen2.5-7B-Instruct-Q4_K_M.gguf ${p.gpuFlag} --embeddings --port 8081</div>
        <p style="font-size:0.9em;margin:12px 0"><strong>Step 2:</strong> Generate embeddings for your documents</p>
        <div class="cmd" onclick="copyText(this)" style="white-space:pre-wrap">curl http://localhost:8081/embedding -H "Content-Type: application/json" -d '{"content": "Your document text here"}'</div>
        <p style="font-size:0.9em;margin:12px 0"><strong>Step 3:</strong> Start chat server and query with context</p>
        <div class="cmd" onclick="copyText(this)" style="white-space:pre-wrap">curl http://localhost:8080/v1/chat/completions -H "Content-Type: application/json" \\
  -d '{"model":"qwen","messages":[{"role":"system","content":"Answer based on context: [retrieved docs]"},{"role":"user","content":"What does the document say about X?"}]}'</div>
        <div style="margin-top:12px;padding:10px;background:var(--green-dim);border-left:3px solid var(--green);border-radius:4px">
            <p style="font-size:0.85em"><strong>How it works:</strong> Embed your documents, store vectors in a simple array or SQLite.
            At query time, embed the question, find similar documents via cosine similarity, inject them as context to the LLM.</p>
        </div>
    </div>`;

    // VRAM/RAM Requirements Reference
    html += `<div class="detail-section">
        <h3>VRAM / RAM Requirements Quick Reference</h3>
        <table class="perf-table"><thead><tr><th>Model Size</th><th>Q4_K_M</th><th>Q5_K_M</th><th>Q8_0</th><th>F16</th></tr></thead><tbody>
            <tr><td>1B params</td><td>~0.8 GB</td><td>~1.0 GB</td><td>~1.3 GB</td><td>~2.0 GB</td></tr>
            <tr><td>3B params</td><td>~2.0 GB</td><td>~2.5 GB</td><td>~3.5 GB</td><td>~6.0 GB</td></tr>
            <tr><td>7-8B params</td><td>~4.5 GB</td><td>~5.5 GB</td><td>~8.0 GB</td><td>~15 GB</td></tr>
            <tr><td>14B params</td><td>~8.5 GB</td><td>~10 GB</td><td>~15 GB</td><td>~28 GB</td></tr>
            <tr><td>32B params</td><td>~20 GB</td><td>~24 GB</td><td>~34 GB</td><td>~64 GB</td></tr>
            <tr><td>70B params</td><td>~40 GB</td><td>~48 GB</td><td>~70 GB</td><td>~140 GB</td></tr>
        </tbody></table>
        <p style="font-size:0.85em;color:var(--text-secondary);margin-top:8px">
            Add ~500 MB per 1K context length. GPU offload (<code>-ngl 999</code>) requires VRAM; CPU inference uses RAM.
            Q4_K_M offers the best balance of quality vs. size for most use cases.
        </p>
    </div>`;

    // Quantization Guide
    html += `<div class="detail-section">
        <h3>Quantization Levels Explained</h3>
        <table class="perf-table"><thead><tr><th>Level</th><th>Bits/Weight</th><th>Quality</th><th>Speed</th><th>Best For</th></tr></thead><tbody>
            <tr><td><strong>Q2_K</strong></td><td>2.5</td><td>Low</td><td>Fastest</td><td>Experimentation only</td></tr>
            <tr><td><strong>Q3_K_M</strong></td><td>3.4</td><td>Fair</td><td>Very fast</td><td>Memory-constrained devices</td></tr>
            <tr><td><strong>Q4_K_M</strong></td><td>4.8</td><td>Good</td><td>Fast</td><td>Best general-purpose choice</td></tr>
            <tr><td><strong>Q5_K_M</strong></td><td>5.7</td><td>Very good</td><td>Moderate</td><td>Quality-sensitive tasks</td></tr>
            <tr><td><strong>Q6_K</strong></td><td>6.6</td><td>Excellent</td><td>Slower</td><td>Near-lossless quality</td></tr>
            <tr><td><strong>Q8_0</strong></td><td>8.5</td><td>Near-perfect</td><td>Slower</td><td>Accuracy-critical work</td></tr>
            <tr><td><strong>F16</strong></td><td>16.0</td><td>Perfect</td><td>Slowest</td><td>Reference / fine-tuning base</td></tr>
        </tbody></table>
        <p style="font-size:0.85em;color:var(--text-secondary);margin-top:8px">
            <strong>Recommendation:</strong> Start with Q4_K_M. If quality seems off, try Q5_K_M. Use Q8_0 for coding models where precision matters.
            Perplexity difference between Q4_K_M and F16 is typically &lt;1% for 7B+ models.
        </p>
    </div>`;

    html += '</div>';
    return html;
}

            <tr><td>Setup</td><td>One command install</td><td>Build from source (most platforms)</td></tr>
            <tr><td>Model management</td><td>Automatic download/versioning</td><td>Manual GGUF download</td></tr>
            <tr><td>API</td><td>OpenAI-compatible built-in</td><td>llama-server (similar API)</td></tr>
            <tr><td>GPU detection</td><td>Automatic</td><td>Build flags required</td></tr>
            <tr><td>Performance</td><td>Slightly lower (wrapper overhead)</td><td>Maximum throughput</td></tr>
            <tr><td>Customization</td><td>Modelfiles, limited params</td><td>Full control over all parameters</td></tr>
            <tr><td>Multimodal</td><td>Built-in vision models</td><td>Separate mmproj configuration</td></tr>
            <tr><td>Best for</td><td>Quick setup, application development</td><td>Production servers, max performance</td></tr>
        </tbody></table>
        <p style="font-size:0.85em;color:var(--text-secondary);margin-top:8px">
            Both can run the same GGUF models. Ollama uses llama.cpp internally.
            Use Ollama for convenience, llama.cpp directly for maximum control.
        </p>
    </div>`;

    html += '</div>';
    return html;
}

// PLATFORM & INIT
// =============================================================================
function setPlatform(platform) {
    currentPlatform = platform;
    localStorage.setItem('ark-platform', platform);
    router();
}

window.addEventListener('hashchange', router);
window.addEventListener('DOMContentLoaded', () => {
    if (!window.location.hash) window.location.hash = '#/';
    router();
    checkInstalledTools();
});
</script>
