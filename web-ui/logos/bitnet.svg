<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- BitNet: 1-bit binary pattern with neural network motif -->
  <rect width="64" height="64" rx="12" fill="#1a1a2e"/>
  <!-- Binary digits -->
  <text x="10" y="28" font-family="monospace" font-size="14" font-weight="bold" fill="#00d4aa">1</text>
  <text x="24" y="28" font-family="monospace" font-size="14" font-weight="bold" fill="#00d4aa">0</text>
  <text x="38" y="28" font-family="monospace" font-size="14" font-weight="bold" fill="#00d4aa">1</text>
  <!-- Network connections -->
  <line x1="16" y1="32" x2="32" y2="44" stroke="#00d4aa" stroke-width="2" opacity="0.6"/>
  <line x1="30" y1="32" x2="32" y2="44" stroke="#00d4aa" stroke-width="2" opacity="0.6"/>
  <line x1="44" y1="32" x2="32" y2="44" stroke="#00d4aa" stroke-width="2" opacity="0.6"/>
  <!-- Output node -->
  <circle cx="32" cy="46" r="5" fill="#00d4aa"/>
  <text x="29" y="50" font-family="monospace" font-size="8" font-weight="bold" fill="#1a1a2e">1</text>
  <!-- Label -->
  <text x="10" y="60" font-family="sans-serif" font-size="7" fill="#888">BitNet</text>
</svg>
